// ── Helpers ──
const fQ = v => `Q ${Number(v||0).toLocaleString("es-GT",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fN = v => Number(v||0).toLocaleString("es-GT");
const hoy = () => { const d=new Date(); const off=d.getTimezoneOffset(); const local=new Date(d.getTime()-off*60000); return local.toISOString().slice(0,10); };
const toNum = v => { const n=parseFloat(String(v||"").replace(/[Q,\s]/g,"")); return isNaN(n)?0:n; };
const esRuta = v => typeof v==="string" && /^ruta\s*\d+/i.test(v.trim());
const esCliente = v => typeof v==="string" && /^PT\d+/i.test(v.trim());
const esProducto = v => typeof v==="string" && /^\[\d+\]/.test(v.trim());
const esPedido = v => typeof v==="string" && /^SO\d+/i.test(v.trim());
const esNota = v => typeof v==="string" && v.trim().startsWith("📝");

// ── Firebase helpers ──
async function fbGet(path) {
  const snap = await db.ref(path).once("value");
  return snap.val();
}
async function fbSet(path, data) {
  await db.ref(path).set(data);
}
async function fbRemove(path) {
  await db.ref(path).remove();
}

// ── Parse archivo ──
function parseFile(raw) {
  const map={};
  let ruta="",cliente="",pedidoDefault="";
  for(let i=0;i<raw.length;i++){
    const cells=Array.isArray(raw[i])?raw[i]:Object.values(raw[i]);
    const A=String(cells[0]||"").trim();
    const B=String(cells[1]||"").trim();
    if(cells.every(c=>c===""||c===null||c===undefined)) continue;
    if(esRuta(A)){ruta=A;continue;}
    if(esCliente(A)){
      const partes=A.split(/\s[—–-]+\s|\s{2,}/);
      const codigo=partes[0].trim();
      const nombre=partes.slice(1).join(" ").trim()||B;
      // El pedido en la fila del cliente puede ser "SO63077 / SO63089" (múltiples)
      // El pedido real de cada producto viene en columna C de la línea del producto
      const pedCol=String(cells[2]||"").trim();
      const primerPed=pedCol.split(/[/,\s]+/).map(x=>x.trim()).find(x=>esPedido(x)||/^[A-Z]{1,3}\d{4,}/i.test(x))||"S/N";
      cliente=nombre?`${codigo} - ${nombre}`:codigo;
      pedidoDefault=primerPed;
      if(!map[cliente]) map[cliente]={ruta,pedidos:{}};
      continue;
    }
    // Línea con valor: producto con código [nnn] O texto libre con unidades/monto distintos de cero
    const esLineaValor = A && !esRuta(A) && !esCliente(A) && !esNota(A) && cliente &&
      (esProducto(A) || (toNum(cells[4])!==0 || toNum(cells[5])!==0));
    if(esLineaValor){
      // Col C (índice 2): número de pedido del producto
      // Col D (índice 3): Est.ped ("Blo", "Pre", etc.)
      // Col E (índice 4): cantidad
      // Col F (índice 5): monto
      const pedProd=String(cells[2]||"").trim();
      const estPed=String(cells[3]||"").trim();
      const pedido=(esPedido(pedProd)||/^[A-Z]{1,3}\d{4,}/i.test(pedProd))?pedProd:pedidoDefault;
      const unidades=toNum(cells[4]);
      const monto=toNum(cells[5]);
      if(unidades!==0||monto!==0){
        if(!map[cliente].pedidos[pedido]) map[cliente].pedidos[pedido]={lineas:[],estPed:""};
        if(estPed) map[cliente].pedidos[pedido].estPed=estPed;
        map[cliente].pedidos[pedido].lineas.push({producto:A,unidades,monto,estPed});
      }
    }
    if(esNota(A)&&cliente){
      const textoNota=A.replace(/^📝\s*/,'').trim();
      if(textoNota){
        if(!map[cliente].pedidos[pedidoDefault]) map[cliente].pedidos[pedidoDefault]={lineas:[],estPed:""};
        map[cliente].pedidos[pedidoDefault].nota=textoNota;
      }
    }
  }
  // Post-proceso: un pedido es "Pre" si TODOS sus productos son Pre
  Object.values(map).forEach(cl=>{
    Object.values(cl.pedidos).forEach(ped=>{
      if(ped.lineas.length===0) return;
      const todosPre=ped.lineas.every(l=>/^pre$/i.test(l.estPed||""));
      ped.estPed=todosPre?"Pre":(ped.lineas.some(l=>/^blo$/i.test(l.estPed||""))?"Blo":"");
    });
  });
  return map;
}

function setState(updates) {
  Object.assign(state, updates);
  render();
  // Guardado automático en Firebase cuando cambian datos del día
  const camposGuardar = ["estadoEntrega","entregados","bloqueados",
    "motivosDevTotal","descuentos","comentarios","billetes","monedas",
    "deposito","transferencia","gastosDetalle"];
  const afecta = Object.keys(updates).some(k => camposGuardar.includes(k));
  if(afecta && state.autenticado && state.clienteMap && Object.keys(state.clienteMap).length > 0){
    clearTimeout(window._autoSaveTimer);
    window._autoSaveTimer = setTimeout(async () => {
      try {
        const actual = await fbGet("datos-dia");

            ...actual,
            estadoEntrega: state.estadoEntrega,

            descuentos: state.descuentos,

            monedas: state.monedas,
            deposito: state.deposito,
            transferencia: state.transferencia,
            gastosDetalle: state.gastosDetalle
          });
        }
      } catch(e) { console.warn("AutoSave error:", e); }
    }, 1500);
  }
}

// ── Totales ──
// Helper: true si todos los pedidos del cliente son "Pre"
function esClientePre(c) {
  const pedidos = Object.values(state.clienteMap[c]?.pedidos||{});
  return pedidos.length > 0 && pedidos.every(p=>/^pre$/i.test(p.estPed||""));
}
// Helper: true si un pedido específico es "Pre"
const esPedPre = p => /^pre$/i.test(p?.estPed||"");

function totalesCliente(c) {
  let u=0,m=0;
  Object.values(state.clienteMap[c]?.pedidos||{}).forEach(p=>{
    if(esPedPre(p)) return; // excluir pedidos en presupuesto
    p.lineas.forEach(l=>{u+=l.unidades;m+=l.monto;});
  });
  const devs=state.devoluciones.filter(d=>d.cliente===c);
  const dU=devs.reduce((s,d)=>s+d.unidades,0),dM=devs.reduce((s,d)=>s+d.monto,0);
  const desc=parseFloat(state.descuentos[c])||0;
  return {unidades:u,monto:m,devU:dU,devM:dM,desc,netoU:u-dU,netoM:m-dM-desc};
}

function estadoCliente(c) {
  // verde: confirmado sin devoluciones
  // amarillo: confirmado con devoluciones parciales
  // rosado: devolucion total (neto = 0)
  // null: no confirmado
  const est = state.estadoEntrega[c];
  return est || null;
}

function totalesGral() {
  return Object.keys(state.clienteMap).reduce((acc,c)=>{
    if(esClientePre(c)) return acc;
    const t=totalesCliente(c);
    acc.unidades+=t.unidades;acc.monto+=t.monto;acc.devM+=t.devM;acc.desc+=t.desc;acc.netoM+=t.netoM;
    return acc;
  },{unidades:0,monto:0,devM:0,desc:0,netoM:0});
}

function prodsDisp(c,p) {
  return (state.clienteMap[c]?.pedidos?.[p]?.lineas||[]).map(l=>{
    const yU=state.devoluciones.filter(d=>d.cliente===c&&d.pedido===p&&d.producto===l.producto).reduce((s,d)=>s+d.unidades,0);
    const yM=state.devoluciones.filter(d=>d.cliente===c&&d.pedido===p&&d.producto===l.producto).reduce((s,d)=>s+d.monto,0);
    return {...l,dispU:l.unidades-yU,dispM:l.monto-yM};
  }).filter(l=>l.dispU>0);
}

function precioUnit(cliente,pedido,producto) {
  const linea=state.clienteMap[cliente]?.pedidos?.[pedido]?.lineas?.find(l=>l.producto===producto);
  if(!linea||linea.unidades===0) return 0;
  return linea.monto/linea.unidades;
}

async function iniciarSesionConUsuario(usuario) {
  _loginEnProceso = false;
  const admin = usuario.rol === "admin";
  guardarSesionLocal(usuario);
  guardarPersonalLocal();
  setState({autenticado:true, esAdmin:admin, usuarioActual:usuario, appPassError:"", cargandoDatos:true});
  // Cargar config desde Firebase (pass desbloqueo, motivos, personal)
  try {
    const cfg=await fbGet("config")||{};
    if(cfg.passDesbloqueo) PASS_DESBLOQUEO=cfg.passDesbloqueo;
    if(cfg.motivos && Array.isArray(cfg.motivos) && cfg.motivos.length>0) MOTIVOS=cfg.motivos;
    const reps=Array.isArray(cfg.personal?.repartidores)?cfg.personal.repartidores:[];
    const auxs=Array.isArray(cfg.personal?.auxiliares)?cfg.personal.auxiliares:[];
    state.listaRepartidores=reps;
    state.listaAuxiliares=auxs;
    // Siempre en blanco al iniciar sesión (selección obligatoria cada vez)
    state.loginRepartidor="";
    state.loginAuxiliar="";
  } catch(e){}
  const datos=await fbGet("datos-dia");
  if(datos && datos.clienteMap && Object.keys(datos.clienteMap).length>0){
    const yaConfirmado = datos.confirmado === true;
    if(yaConfirmado && admin){
      setState({
        clienteMap:datos.clienteMap, fileName:datos.fileName||"", fecha:hoy(),
        estadoEntrega:datos.estadoEntrega||{}, entregados:datos.entregados||{},
        bloqueados:datos.bloqueados||{}, devoluciones:datos.devoluciones||[],
        motivosDevTotal:datos.motivosDevTotal||{}, descuentos:datos.descuentos||{},
        comentarios:datos.comentarios||{},
        billetes:datos.billetes||Object.fromEntries([1,5,10,20,50,100,200].map(b=>[b,""])),
        monedas:datos.monedas||"", deposito:datos.deposito||"", transferencia:datos.transferencia||"",
        gastosDetalle:datos.gastosDetalle||[{desc:"",monto:"",comentario:""}],
        confirmado:true, screen:"opciones", cargandoDatos:false
      });
    } else {
      setState({
        clienteMap:datos.clienteMap, fileName:datos.fileName||"", fecha:hoy(),
        screen:admin?"menu":"main", cargandoDatos:false, confirmado:yaConfirmado,
        estadoEntrega:datos.estadoEntrega||{}, entregados:datos.entregados||{},
        bloqueados:datos.bloqueados||{}, devoluciones:datos.devoluciones||[],
        motivosDevTotal:datos.motivosDevTotal||{}, descuentos:datos.descuentos||{},
        comentarios:datos.comentarios||{},
        billetes:datos.billetes||Object.fromEntries([1,5,10,20,50,100,200].map(b=>[b,""])),
        monedas:datos.monedas||"", deposito:datos.deposito||"", transferencia:datos.transferencia||"",
        gastosDetalle:datos.gastosDetalle||[{desc:"",monto:"",comentario:""}]
      });
    }
  } else {
    setState({screen:admin?"menu":"nodatos", cargandoDatos:false});
  }
}

async function iniciarSesion() {
  if(_loginEnProceso) return;
  const nombreInput = (state.appUser||"").trim();
  const pass = (state.appPass||"").trim();
  if(!nombreInput || !pass) { state.appPassError="Ingresa usuario y contraseña."; render(); return; }
  state.appPassError=""; state.cargandoDatos=true; _loginEnProceso=true; render();

  try {
    const usuarios = await fbGet("usuarios") || {};
    const found = Object.values(usuarios).find(u =>
      (u.nombre||"").toLowerCase() === nombreInput.toLowerCase()
    );

    if(!found) { state.appPassError="Usuario no encontrado."; state.cargandoDatos=false; _loginEnProceso=false; render(); return; }

    // Validar repartidor y auxiliar para usuarios no-admin
    if(found.rol !== "admin") {
      if(!state.loginRepartidor || !state.loginAuxiliar) {
        state.appPassError="Selecciona los campos obligatorios marcados con *.";
        state.cargandoDatos=false; _loginEnProceso=false;
        setTimeout(()=>{
          const ar=document.getElementById("ast-rep"); if(ar && !state.loginRepartidor) ar.style.color="#e53935";
          const aa=document.getElementById("ast-aux"); if(aa && !state.loginAuxiliar) aa.style.color="#e53935";
          const ley=document.getElementById("leyenda-oblig"); if(ley) ley.style.color="#e53935";
        },50);
        render(); return;
      }
    }

    if(found.rol === "admin" && found.email) {
      try {
        const cred = await auth.signInWithEmailAndPassword(found.email, pass);
        const usuario = {id:cred.user.uid, nombre:found.nombre, rol:"admin", email:found.email};
        await iniciarSesionConUsuario(usuario);
      } catch(e) {
        let msg = "Contraseña incorrecta.";
        if(e.code==="auth/too-many-requests") msg="Demasiados intentos. Intenta más tarde.";
        state.appPassError=msg; state.cargandoDatos=false; _loginEnProceso=false; render();
      }
    } else {
      if(found.pass !== pass) { state.appPassError="Contraseña incorrecta."; state.cargandoDatos=false; _loginEnProceso=false; render(); return; }
      const usuario = {id:found.id, nombre:found.nombre, rol:found.rol||"repartidor"};
      await iniciarSesionConUsuario(usuario);
    }
  } catch(e) {
    state.appPassError="Error al conectar. Verifica tu conexión."; state.cargandoDatos=false; _loginEnProceso=false; render();
  }
}

async function recuperarContrasena() {
  const nombreInput = (state.appUser||"").trim();
  if(!nombreInput) { setState({appPassError:"Ingresa tu nombre de usuario primero."}); return; }
  try {
    const usuarios = await fbGet("usuarios") || {};
    const found = Object.values(usuarios).find(u =>
      (u.nombre||"").toLowerCase() === nombreInput.toLowerCase()
    );
    if(!found || found.rol !== "admin" || !found.email) {
      setState({appPassError:"Solo el administrador puede recuperar su contraseña por correo."});
      return;
    }
    await auth.sendPasswordResetEmail(found.email);
    setState({appPassError:"", resetEnviado:true});
  } catch(e) {
    setState({appPassError:"No se pudo enviar el correo de recuperación."});
  }
}

async function cerrarSesion() {
  borrarSesionLocal();
  await auth.signOut();
  setState({
    autenticado:false, esAdmin:false, usuarioActual:null,
    screen:"upload", clienteMap:{}, confirmado:false,
    appPass:"", appUser:"", appPassError:"", resetEnviado:false
  });
}

async function cargarUsuarios() {

}

async function guardarUsuario() {
  const f = state.adminUsuForm;
  if(!f) return;
  const nombre = (f.nombre||"").trim();
  const pass = (f.pass||"").trim();
  const rol = f.rol || "repartidor";
  const email = (f.email||"").trim();

  if(!nombre) { setState({adminUsuError:"El nombre es requerido."}); return; }
  if(!f.editando && !pass) { setState({adminUsuError:"La contraseña es requerida."}); return; }
  if(rol === "admin" && !email) { setState({adminUsuError:"El correo es requerido para el administrador."}); return; }

  setState({adminUsuError:"", guardandoUsuario:true});
  try {
    let uid = f.id;
    if(!f.editando) {
      if(rol === "admin") {
        // Crear en Firebase Auth
        if(pass.length < 6) { setState({adminUsuError:"La contraseña debe tener mínimo 6 caracteres.", guardandoUsuario:false}); return; }
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        uid = cred.user.uid;
        // Re-autenticar al admin actual
        const adminPerfil = await fbGet("usuarios/"+state.usuarioActual.id);
        if(adminPerfil?.email) {
          const adminPass = prompt("Para continuar, confirma tu contraseña de administrador:");
          if(adminPass) await auth.signInWithEmailAndPassword(adminPerfil.email, adminPass);
        }
        await fbSet("usuarios/"+uid, {id:uid, nombre, email, rol:"admin"});
      } else {
        // Repartidor: solo en DB
        uid = nombre.toLowerCase().replace(/[^a-z0-9]/g,"_")+"_"+Date.now();
        await fbSet("usuarios/"+uid, {id:uid, nombre, pass, rol:"repartidor"});
      }
    } else {
      // Editar: actualizar perfil
      const updates = {id:uid, nombre, rol};
      if(rol === "admin") updates.email = email;
      if(rol === "repartidor" && pass) updates.pass = pass;
      await fbSet("usuarios/"+uid, {...f, ...updates});
    }
    const usu = await fbGet("usuarios") || {};
    setState({adminUsuarios:usu, adminUsuForm:null, adminUsuError:"", guardandoUsuario:false});
    showToast("✅ Usuario guardado","#27ae60");
  } catch(e) {
    let msg = "Error al guardar usuario.";
    if(e.code==="auth/email-already-in-use") msg="Ese correo ya está registrado.";
    else if(e.code==="auth/weak-password") msg="Contraseña muy débil (mín. 6 caracteres).";
    setState({adminUsuError:msg, guardandoUsuario:false});
  }
}

async function procesarArchivo(file) {
  setState({error:""});
  try {
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    const map=parseFile(raw);
    if(!Object.keys(map).length){setState({error:"No se encontraron entregas."});return;}
    // Limpiar claves para Firebase (no permite . # $ / [ ])
    const cleanKey=k=>k.replace(/[.#$\/\[\]]/g,"_");
    const cleanMap={};
    Object.entries(map).forEach(([k,v])=>{
      const cleanPedidos={};
      Object.entries(v.pedidos||{}).forEach(([pk,pv])=>{cleanPedidos[cleanKey(pk)]={...pv,pedidoOriginal:pk};});
      cleanMap[cleanKey(k)]={...v,pedidos:cleanPedidos,nombreOriginal:k};
    });
    await fbSet("datos-dia",{clienteMap:cleanMap,fileName:file.name,fecha:state.fecha});
    setState({
      clienteMap:cleanMap,devoluciones:[],entregados:{},estadoEntrega:{},motivosDevTotal:{},descuentos:{},comentarios:{},bloqueados:{},
      deposito:"",transferencia:"",gastosDetalle:[{desc:"",monto:"",comentario:"",deCuenta:true}],
      billetes:Object.fromEntries(BILLETES.map(b=>[b,""])),monedas:"",confirmado:false,
      fileName:file.name,screen:"main",busqueda:""
    });
  } catch(e){setState({error:"Error: "+e.message});}
}

async function confirmarLiquidacion() {
  setState({guardando:true});
  try {
    const existing=await fbGet("historial")||{};
    // Calcular y guardar totales por cliente para el historial (excluir presupuestos)
    const clienteTotales = {};
    Object.keys(state.clienteMap).forEach(c => {
      if(esClientePre(c)) return;
      if(!state.estadoEntrega[c]) return;
      let m=0;
      Object.values(state.clienteMap[c].pedidos||{}).forEach(p=>p.lineas.forEach(l=>{m+=l.monto;}));
      const devM=state.devoluciones.filter(d=>d.cliente===c).reduce((s,d)=>s+d.monto,0);
      const desc=parseFloat(state.descuentos[c])||0;
      clienteTotales[c] = m - devM - desc;
    });
    const totalNeto = Object.values(clienteTotales).reduce((s,v)=>s+v,0);

    existing[state.fecha]={
      fecha:state.fecha,fileName:state.fileName,
      entregados:state.entregados,
      estadoEntrega:state.estadoEntrega,
      motivosDevTotal:state.motivosDevTotal,
      devoluciones:state.devoluciones,
      descuentos:state.descuentos,comentarios:state.comentarios,
      deposito:state.deposito,transferencia:state.transferencia,
      gastosDetalle:state.gastosDetalle,billetes:state.billetes,monedas:state.monedas,
      clienteTotales, totalNeto,
      clienteMap: state.clienteMap
    };
    await fbSet("historial",existing);
    // Guardar datos-dia con flag confirmado (no borrar, para poder reabrir)
    const datosActuales = await fbGet("datos-dia");
    if(datosActuales) await fbSet("datos-dia", {...datosActuales, confirmado:true});
    setState({confirmado:true,showConfirmar:false,guardando:false,screen:"confirmado"});
  } catch(e){
    console.error(e);
    setState({guardando:false,showConfirmar:false});
    alert("❌ Error al guardar la liquidación:\n" + e.message);
  }
}

async function exportarExcel(reg) {
  const wb=XLSX.utils.book_new();
  const devs=reg.devoluciones||[];
  const descs=reg.descuentos||{};
  const coments=reg.comentarios||{};
  const estadoEnt=reg.estadoEntrega||reg.entregados||{};
  const cMap=reg.clienteMap||{};
  const gastos=reg.gastosDetalle||[];
  const billetes=reg.billetes||{};
  const clts=[...new Set([...Object.keys(estadoEnt),...Object.keys(cMap),...devs.map(d=>d.cliente)])].filter(Boolean).filter(c=>{ const ps=Object.values(cMap[c]?.pedidos||{}); return !(ps.length>0&&ps.every(p=>/^pre$/i.test(p.estPed||""))); }).sort();

  // ── Hoja 1: Resumen ──
  // Fix obs.2: devoluciones siempre se muestran en columna Devoluciones (positivo),
  // Total neto = bruto - devoluciones - descuentos
  let sB=0,sD=0,sDe=0,sN=0;
  const resRows=[["Ruta","Cliente","Estado","Total bruto Q","Devoluciones Q","Descuento Q","Total neto Q","Comentario"]];
  const cltsSorted=[...clts].sort((a,b)=>{
    const ra=cMap[a]?.ruta||"ZZZ", rb=cMap[b]?.ruta||"ZZZ";
    return ra.localeCompare(rb);
  });
  cltsSorted.forEach(c=>{
    const ruta=cMap[c]?.ruta||"";
    const est=estadoEnt[c];
    const lbl=est==="verde"?"Entregado":est==="amarillo"?"Parcial":est==="rosado"?"Dev. total":"Pendiente";
    let bruto=0; Object.values(cMap[c]?.pedidos||{}).forEach(p=>p.lineas.forEach(l=>{bruto+=l.monto;}));
    // Devoluciones: si rosado = bruto completo; si amarillo = devs parciales registradas
    const dv = est==="rosado" ? bruto : devs.filter(d=>d.cliente===c).reduce((s,d)=>s+d.monto,0);
    const dc = est==="rosado" ? 0 : (parseFloat(descs[c])||0);
    const nt = bruto - dv - dc;
    sB+=bruto; sD+=dv; sDe+=dc; sN+=nt;
    // dv como positivo en la columna, neto ya refleja la resta
    resRows.push([ruta,c,lbl,bruto,dv>0?dv:0,dc>0?dc:0,nt,coments[c]||""]);
  });
  resRows.push(["","TOTAL","",sB,sD,sDe,sN,""]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(resRows),"Resumen");

  // ── Hoja 2: Productos ──
  // Fix obs.3a: agregar columna Estado de entrega
  // Fix obs.3b: unidades/monto devueltos correctos (incluyendo devolución total = todas las unidades)
  const pRows=[["Ruta","Cliente","Estado","Pedido","Producto","Unid pedidas","Monto Q","Unid devueltas","Monto dev Q","Unid netas","Monto neto Q"]];
  const cltsP=[...clts].sort((a,b)=>{
    const ra=cMap[a]?.ruta||"ZZZ", rb=cMap[b]?.ruta||"ZZZ";
    return ra.localeCompare(rb);
  });
  cltsP.forEach(c=>{
    const ruta=cMap[c]?.ruta||"";
    const est=estadoEnt[c];
    const lbl=est==="verde"?"Entregado":est==="amarillo"?"Parcial":est==="rosado"?"Dev. total":"Pendiente";
    const esRosado = est==="rosado";
    Object.entries(cMap[c]?.pedidos||{}).forEach(([ped,pd])=>{
      pd.lineas.forEach(l=>{
        let du,dm;
        if(esRosado){
          // Devolución total: todas las unidades y monto del producto
          du=l.unidades; dm=l.monto;
        } else {
          const dv=devs.filter(d=>d.cliente===c&&d.pedido===ped&&d.producto===l.producto);
          du=dv.reduce((s,d)=>s+d.unidades,0);
          dm=dv.reduce((s,d)=>s+d.monto,0);
        }
        pRows.push([ruta,c,lbl,ped,l.producto,l.unidades,l.monto,du||0,dm||0,l.unidades-du,l.monto-dm]);
      });
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pRows),"Productos");

  // ── Hoja 3: Devoluciones ──
  // Fix obs.3b: incluir devoluciones totales (rosados) aunque no tengan registro línea a línea
  const dRows=[["Cliente","Estado","Pedido","Producto","Unidades","Monto Q","Codigo","Motivo"]];
  // Primero devs parciales registradas
  const MOTIVOS_MAP_EXP={"D01":"Cliente rechazó el pedido","D02":"Producto incorrecto","D03":"Sin dinero","D04":"Cerrado"};
  devs.forEach(d=>{
    const est=estadoEnt[d.cliente];
    const lbl=est==="amarillo"?"Parcial":est==="rosado"?"Dev. total":"Dev. parcial";
    // Para rosados, el motivo real está en motivosDevTotal; para parciales en d.desc
    const motivoRosado = est==="rosado" ? (reg.motivosDevTotal?.[d.cliente]||{}) : null;
    const codigo = motivoRosado?.codigo || d.codigo || "D01";
    const descFinal = motivoRosado?.desc || d.desc || MOTIVOS_MAP_EXP[codigo] || codigo || "";
    dRows.push([d.cliente,lbl,d.pedido,d.producto,d.unidades,d.monto,codigo,descFinal]);
  });
  // Luego rosados sin devs registradas línea a línea (devolución total implícita)
  clts.forEach(c=>{
    if(estadoEnt[c]!=="rosado") return;
    const yaRegistrado = devs.some(d=>d.cliente===c);
    if(yaRegistrado) return; // ya aparece arriba
    const motivo=reg.motivosDevTotal?.[c]||{};
    const codigoMot = motivo.codigo||"D01";
    const descMot = motivo.desc || MOTIVOS_MAP_EXP[codigoMot] || "Devolución total";
    Object.entries(cMap[c]?.pedidos||{}).forEach(([ped,pd])=>{
      pd.lineas.forEach(l=>{
        dRows.push([c,"Dev. total",ped,l.producto,l.unidades,l.monto,codigoMot,descMot]);
      });
    });
  });
  if(dRows.length>1) XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(dRows),"Devoluciones");

  // ── Hoja 4: Cuadre Final ──
  const tB=[1,5,10,20,50,100,200].reduce((s,b)=>s+b*(parseFloat(billetes[b])||0),0);
  const mon=parseFloat(reg.monedas)||0,tEf=tB+mon;
  const tDep=parseFloat(reg.deposito)||0,tTra=parseFloat(reg.transferencia)||0;
  const tGas=gastos.reduce((s,g)=>s+(parseFloat(g.monto)||0),0);
  const tGasDeCuenta=gastos.reduce((s,g)=>g.deCuenta?(s+(parseFloat(g.monto)||0)):s,0);
  const tGasBodega=tGas-tGasDeCuenta;
  const tPag=tEf+tDep+tTra,nRec=tPag-tGasDeCuenta,dif=nRec-sN;
  const cuadreRows=[
    ["CUADRE FINAL - "+(reg.fecha||"")],[],["BILLETES","Cantidad","Total Q"],
    ...[1,5,10,20,50,100,200].map(b=>{const c=parseFloat(billetes[b])||0;return c>0?["Q"+b,c,b*c]:null;}).filter(Boolean),
    ["Subtotal billetes","",tB],["Monedas","",mon],["Total efectivo","",tEf],
    [],[" OTROS PAGOS","",""],["Deposito bancario","",tDep],["Transferencia","",tTra],
    [],[" GASTOS DE RUTA","Descripcion","Monto Q","De cuenta (✓=si)"],
    ...gastos.filter(g=>parseFloat(g.monto)).map(g=>[g.comentario||"",g.desc||"",parseFloat(g.monto),g.deCuenta?"✓":"—"]),
    ["Gastos de ruta (bodega)","",tGasBodega],["Gastos de ruta (de cuenta)","",tGasDeCuenta],["Total gastos","",tGas],
    [],[" RESUMEN","",""],
    ["Total a entregar (bruto)","",sB],["(-) Devoluciones","",-sD],["(-) Descuentos","",-sDe],["Total neto a cobrar","",sN],
    [],[" PAGOS RECIBIDOS","",""],
    ["Total pagos recibidos","",tPag],["(-) Gastos de ruta de cuenta","",-tGasDeCuenta],["Neto recibido","",nRec],
    [],[Math.abs(dif)<0.01?"✓ CUADRADO":dif>0?"SOBRANTE":"FALTANTE","DIFERENCIA",dif],
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cuadreRows),"Cuadre Final");
  XLSX.writeFile(wb,"Liquidacion_"+(reg.fecha||"").replace(/[/]/g,"-")+".xlsx");
}

function guardarDev() {
  if(!state.dvPedido||!state.dvProducto){setState({dvError:"Selecciona pedido y producto."});return;}
  const u=parseFloat(state.dvUnidades)||0,m=parseFloat(state.dvMonto)||0;
  if(u<=0||m<=0){setState({dvError:"Ingresa unidades válidas."});return;}
  const prod=prodsDisp(state.clienteDetalle,state.dvPedido).find(p=>p.producto===state.dvProducto);
  if(!prod){setState({dvError:"Producto no disponible."});return;}
  if(u>prod.dispU){setState({dvError:`Máximo: ${prod.dispU} unidades.`});return;}
  if(m>prod.dispM+0.01){setState({dvError:`Máximo: ${fQ(prod.dispM)}.`});return;}
  const motivo=MOTIVOS.find(x=>x.codigo===state.dvCodigo);
  setState({
    devoluciones:[...state.devoluciones,{id:Date.now(),cliente:state.clienteDetalle,pedido:state.dvPedido,producto:state.dvProducto,unidades:u,monto:m,codigo:state.dvCodigo,desc:motivo.desc}],
    dvPedido:"",dvProducto:"",dvUnidades:"",dvMonto:"",dvCodigo:"D01",dvError:"",showDvForm:false
  });
}

function guardarDevPopup() {
  const p = state.dvPopup;
  if(!p) return;
  const u = parseFloat(p.unidades)||0;
  if(u<=0){ setState({dvPopup:{...p,error:"Ingresa una cantidad válida."}}); return; }
  if(u>p.dispU){ setState({dvPopup:{...p,error:`Máximo: ${fN(p.dispU)} unidades.`}}); return; }
  const pu = p.dispM / p.dispU;
  const m = parseFloat((u * pu).toFixed(2));
  // Quitar dev temporal previa del mismo producto y agregar la nueva
  const sinEste = state.dvTemporal.filter(d=>!(d.cliente===p.cliente&&d.pedido===p.pedido&&d.producto===p.producto));
  setState({
    dvTemporal:[...sinEste,{id:Date.now(),cliente:p.cliente,pedido:p.pedido,producto:p.producto,unidades:u,monto:m,codigo:"",desc:""}],
    dvPopup:null
  });
}

function aplicarEditPrecio() {
  const {cliente, pedido, producto, valor} = state.editPrecio || {};
  const pu = parseFloat(valor);
  if(!cliente || !pedido || !producto || isNaN(pu) || pu < 0) {
    setState({editPrecio: null}); return;
  }
  const newMap = JSON.parse(JSON.stringify(state.clienteMap));
  const lineas = newMap[cliente]?.pedidos?.[pedido]?.lineas;
  if(!lineas) { setState({editPrecio: null}); return; }
  const linea = lineas.find(l => l.producto === producto);
  if(!linea) { setState({editPrecio: null}); return; }
  linea.monto = parseFloat((pu * linea.unidades).toFixed(2));
  setState({clienteMap: newMap, editPrecio: null});
  showToast("✏️ Precio actualizado", "#2563eb");
}

function aplicarEditCantidad() {
  const {cliente, pedido, producto, valor} = state.editCantidad || {};
  const cant = parseFloat(valor);
  if(!cliente || !pedido || !producto || isNaN(cant) || cant < 0) {
    setState({editCantidad: null}); return;
  }
  const newMap = JSON.parse(JSON.stringify(state.clienteMap));
  const lineas = newMap[cliente]?.pedidos?.[pedido]?.lineas;
  if(!lineas) { setState({editCantidad: null}); return; }
  const linea = lineas.find(l => l.producto === producto);
  if(!linea) { setState({editCantidad: null}); return; }
  const pu = linea.unidades > 0 ? linea.monto / linea.unidades : 0;
  linea.unidades = cant;
  linea.monto = parseFloat((pu * cant).toFixed(2));
  setState({clienteMap: newMap, editCantidad: null});
  showToast("✏️ Cantidad actualizada", "#2563eb");
}

}

function confirmarDesdeDetalle(cliente, tipo, codigoMotivo, descMotivo) {
  const motivo = MOTIVOS.find(x=>x.codigo===codigoMotivo)||{};
  const descFinal = descMotivo || motivo.desc || codigoMotivo || "";
  // Fusionar dvTemporal del cliente con devoluciones permanentes, asignando motivo
  const devsTemporalesCliente = state.dvTemporal
    .filter(d=>d.cliente===cliente)
    .map(d=>({...d, codigo:codigoMotivo||"", desc:descFinal}));
  const devsOtros = state.devoluciones.filter(d=>d.cliente!==cliente);
  const devsFinales = [...devsOtros, ...devsTemporalesCliente];
  const dvTemporalRestante = state.dvTemporal.filter(d=>d.cliente!==cliente);
  const updates = {
    estadoEntrega:{...state.estadoEntrega,[cliente]:tipo},
    entregados:{...state.entregados,[cliente]:true},
    bloqueados:{...state.bloqueados,[cliente]:true},
    devoluciones: devsFinales,
    dvTemporal: dvTemporalRestante,
    clienteDetalle:null, showDvForm:false, dvPedido:"", dvProducto:"", dvError:"",
    scrollAfterCliente: cliente
  };
  if(codigoMotivo){
    updates.motivosDevTotal = {...state.motivosDevTotal, [cliente]:{codigo:codigoMotivo, desc:descFinal}};
  }
  setState(updates);
  if(tipo==="verde") showToast("✅ Entrega confirmada","#27ae60");
  else if(tipo==="amarillo") showToast("🟡 Entrega parcial confirmada","#f9a825");
  else if(tipo==="rosado") showToast("↩️ Devolución total confirmada","#e91e8c");
}

// ── Mover producto entre clientes ──
function ejecutarMoverProducto() {
  const {moverOrigenCliente, moverOrigenPedido, moverProductoSel, moverDestinoCliente, moverDestinoPedido} = state;
  if(!moverOrigenCliente||!moverOrigenPedido||!moverProductoSel||!moverDestinoCliente||!moverDestinoPedido){
    setState({moverError:"Completa todos los campos."}); return;
  }
  if(moverOrigenCliente===moverDestinoCliente && moverOrigenPedido===moverDestinoPedido){
    setState({moverError:"El origen y destino son iguales."}); return;
  }
  const newMap = JSON.parse(JSON.stringify(state.clienteMap));
  const lineasOrigen = newMap[moverOrigenCliente]?.pedidos?.[moverOrigenPedido]?.lineas;
  if(!lineasOrigen){setState({moverError:"Pedido origen no encontrado."}); return;}
  const idx = lineasOrigen.findIndex(l=>l.producto===moverProductoSel);
  if(idx===-1){setState({moverError:"Producto no encontrado en origen."}); return;}
  const [linea] = lineasOrigen.splice(idx,1);
  if(!newMap[moverDestinoCliente]){setState({moverError:"Cliente destino no encontrado."}); return;}
  if(!newMap[moverDestinoCliente].pedidos[moverDestinoPedido]){
    newMap[moverDestinoCliente].pedidos[moverDestinoPedido]={lineas:[],estPed:""};
  }
  newMap[moverDestinoCliente].pedidos[moverDestinoPedido].lineas.push(linea);
  setState({clienteMap:newMap, showMoverProd:false, moverOrigenCliente:"", moverOrigenPedido:"", moverProductoSel:"", moverDestinoCliente:"", moverDestinoPedido:"", moverError:""});
  showToast("Producto movido correctamente","#1e3a5f");
}

function actualizarResumen() {
  const resDiv = document.getElementById("resumen-cuadre");
  const totalBilletes2 = [1,5,10,20,50,100,200].reduce((s,b)=>s+b*(parseFloat(state.billetes[b])||0),0);
  const totalMonedas2 = parseFloat(state.monedas)||0;
  const totalEfectivo2 = totalBilletes2 + totalMonedas2;
  const totalDeposito2 = parseFloat(state.deposito)||0;
  const totalTransferencia2 = parseFloat(state.transferencia)||0;
  const totalGastosDeCuenta2 = state.gastosDetalle.reduce((s,g)=>g.deCuenta?(s+(parseFloat(g.monto)||0)):s,0);
  const totalGastosBodega2 = state.gastosDetalle.reduce((s,g)=>!g.deCuenta?(s+(parseFloat(g.monto)||0)):s,0);
  const totalGastos2 = totalGastosDeCuenta2 + totalGastosBodega2;
  const totalPagos2 = totalEfectivo2 + totalDeposito2 + totalTransferencia2;

  // Total a Entregar: bruto de clientes entregables (excluir presupuestos)
  const totalAEntregar = Object.keys(state.clienteMap).reduce((acc,c)=>{
    if(esClientePre(c)) return acc;
    let m=0; Object.values(state.clienteMap[c].pedidos||{}).filter(p=>!esPedPre(p)).forEach(p=>p.lineas.forEach(l=>{m+=l.monto;}));
    return acc + m;
  },0);
  // Devoluciones: parciales + bruto de rosados (excluir presupuestos)
  const totalDevCuadre = Object.keys(state.clienteMap).reduce((acc,c)=>{
    if(esClientePre(c)) return acc;
    if(state.estadoEntrega[c]==="rosado"){
      let m=0; Object.values(state.clienteMap[c].pedidos||{}).forEach(p=>p.lineas.forEach(l=>{m+=l.monto;}));
      return acc + m;
    }
    return acc + state.devoluciones.filter(d=>d.cliente===c).reduce((s,d)=>s+d.monto,0);
  },0);
  // Descuentos: solo confirmados verde+amarillo (excluir presupuestos)
  const totalDescCuadre = Object.keys(state.clienteMap).reduce((acc,c)=>{
    if(esClientePre(c)) return acc;
    if(!state.estadoEntrega[c]||state.estadoEntrega[c]==="rosado") return acc;
    return acc + (parseFloat(state.descuentos[c])||0);
  },0);
  // Entregas no confirmadas: monto bruto de clientes sin estado (excluir presupuestos)
  const totalNoConfirmado = Object.keys(state.clienteMap).reduce((acc,c)=>{
    if(esClientePre(c)) return acc;
    if(state.estadoEntrega[c]) return acc; // ya tiene estado
    let m=0; Object.values(state.clienteMap[c].pedidos||{}).filter(p=>!esPedPre(p)).forEach(p=>p.lineas.filter(l=>!/^pre$/i.test(l.estPed||"")).forEach(l=>{m+=l.monto;}));
    return acc + m;
  },0);
  // Total Neto: Total a Entregar - Devoluciones - Descuentos - No confirmadas
  const totalNetoCuadre = totalAEntregar - totalDevCuadre - totalDescCuadre - totalNoConfirmado;

  const diferencia2 = (totalPagos2 + totalGastosDeCuenta2) - totalNetoCuadre;
  resDiv.innerHTML = "";
  [
    {label:"Total a Entregar", val:fQ(totalAEntregar), color:"#1e3a5f", bold:true},
    {label:"(-) Devoluciones", val:`-${fQ(totalDevCuadre)}`, color:"#c0392b"},
    {label:"(-) Descuentos", val:`-${fQ(totalDescCuadre)}`, color:"#e67e22"},
    {label:"Ent. no confirmadas", val:totalNoConfirmado>0?`-${fQ(totalNoConfirmado)}`:"Q 0.00", color:"#e67e22"},
    {label:"Total Neto", val:fQ(totalNetoCuadre), color:"#1e3a5f", bold:true, sep:true},
    {label:"Efectivo", val:fQ(totalEfectivo2), color:"#333"},
    {label:"Depósito", val:fQ(totalDeposito2), color:"#333"},
    {label:"Transferencia", val:fQ(totalTransferencia2), color:"#333"},
    {label:"Total recibido", val:fQ(totalPagos2), color:"#2563eb", bold:true},
    {label:"Gastos de ruta ≠ cuenta", val:totalGastosBodega2>0?`-${fQ(totalGastosBodega2)}`:"Q 0.00", color:"#e67e22"},
    {label:"Gastos de ruta de la cuenta", val:totalGastosDeCuenta2>0?`-${fQ(totalGastosDeCuenta2)}`:"Q 0.00", color:"#c0392b"},
  ].forEach(x=>{
    const row=document.createElement("div");
    row.style.cssText=`display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #e2e8f0;${x.sep?"margin-top:6px;border-top:2px solid #1e3a5f;padding-top:6px;":""}`;
    const lbl=document.createElement("span"); lbl.style.color="#666"; lbl.textContent=x.label;
    const val=document.createElement("span"); val.style.cssText=`font-weight:${x.bold?"700":"600"};color:${x.color};`; val.textContent=x.val;
    row.appendChild(lbl); row.appendChild(val); resDiv.appendChild(row);
  });
  const difDiv=document.createElement("div");
  difDiv.style.cssText="margin-top:10px;text-align:center;padding:10px 0;";
  const difLabel=document.createElement("div"); difLabel.style.cssText="font-size:11px;color:#888;margin-bottom:3px;"; difLabel.textContent="DIFERENCIA";
  const difVal=document.createElement("div");
  const difColor=Math.abs(diferencia2)<0.01?"#27ae60":diferencia2>0?"#2563eb":"#c0392b";
  difVal.style.cssText=`font-size:22px;font-weight:700;color:${difColor};`;
  difVal.textContent=Math.abs(diferencia2)<0.01?"✓ CUADRADO":diferencia2>0?`+${fQ(diferencia2)} SOBRANTE`:`-${fQ(Math.abs(diferencia2))} FALTANTE`;
  difDiv.appendChild(difLabel); difDiv.appendChild(difVal);
  resDiv.appendChild(difDiv);
  // Autosave cuadre en Firebase
  clearTimeout(window._autoSaveCuadre);
  window._autoSaveCuadre = setTimeout(async () => {
    try {
      const actual = await fbGet("datos-dia");
      if(actual) {
        await fbSet("datos-dia", {
          ...actual,
          billetes: state.billetes,
          monedas: state.monedas,
          deposito: state.deposito,
          transferencia: state.transferencia,
          gastosDetalle: state.gastosDetalle
        });
      }
    } catch(e) { console.warn("AutoSave cuadre error:", e); }
  }, 1500);
}

// ── Render helpers ──
const s = (styles) => Object.entries(styles).map(([k,v])=>`${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(';');

function el(tag, attrs={}, ...children) {
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") e.style.cssText=s(v);
    else if(k.startsWith("on")) e[k.toLowerCase()]=v;
    else if(k==="checked") e.checked=v;
    else if(k==="disabled") e.disabled=v;
    else if(k==="autoFocus") { if(v) setTimeout(()=>e.focus(),50); }
    else e.setAttribute(k,v);
  });
  children.flat().forEach(child=>{
    if(child==null||child===false) return;
    e.appendChild(typeof child==="string"?document.createTextNode(child):child);
  });
  return e;
}

  dcGrid.appendChild(comDiv);
  dcBox.appendChild(dcGrid);
  dcBox.appendChild(el("div",{style:{marginTop:"12px",background:"#f0f4f8",borderRadius:"8px",padding:"10px 14px",display:"flex",justifyContent:"space-between",fontSize:"14px"}},
    el("span",{style:{fontWeight:"600"}},"Total a cobrar:"),

  ));

  // Motivo devolución total (rosado) — mostrar aunque no haya líneas de devs

    const motBox=el("div",{style:{background:"#fff0f0",border:"1px solid #f5c6c6",borderRadius:"12px",padding:"12px 16px",marginBottom:"16px",display:"flex",alignItems:"center",gap:"10px"}});
    motBox.appendChild(el("span",{style:{background:"#c0392b",color:"#fff",borderRadius:"5px",padding:"3px 9px",fontSize:"12px",fontWeight:"700",whiteSpace:"nowrap"}},motivoTotal.codigo||""));
    motBox.appendChild(el("span",{style:{fontSize:"13px",color:"#c0392b",fontWeight:"600"}},"Motivo devolución total:"));
    motBox.appendChild(el("span",{style:{fontSize:"13px",color:"#555"}},motivoTotal.desc||""));
    inner.appendChild(motBox);
  }

  // Devoluciones registradas (combinadas: permanentes + temporales)
  if(devsCl.length>0){
    const hayTemporales = devsTempCliente.length > 0;
    const dvBox=el("div",{style:{background:"#fff5f5",borderRadius:"12px",padding:"16px",marginBottom:"16px"}});
    const dvHdr=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}});
    dvHdr.appendChild(el("p",{style:{margin:"0",fontWeight:"700",color:"#c0392b",fontSize:"14px"}},"↩️ Devoluciones registradas"));
    if(hayTemporales){
      dvHdr.appendChild(el("span",{style:{background:"#ff9800",color:"#fff",borderRadius:"5px",padding:"2px 8px",fontSize:"11px",fontWeight:"700"}},"⏳ Pendientes de confirmar"));

    devsCl.forEach(d=>{
      const esTemporal = devsTempCliente.some(dt=>dt.id===d.id);
      const row=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #ffd5d5",fontSize:"13px",opacity:esTemporal?"0.85":"1"}});

      const lineas=[];
      pedidosEntregables.forEach(([pedido,pData])=>{
        pData.lineas.filter(l=>!/^pre$/i.test(l.estPed||"")).forEach(l=>{
          lineas.push({id:Date.now()+Math.random(),cliente:c,pedido,producto:l.producto,unidades:l.unidades,monto:l.monto,codigo:"",desc:""});
        });
      });
      const sinCliente = state.dvTemporal.filter(d=>d.cliente!==c);
      setState({dvTemporal:[...sinCliente,...lineas], showDvForm:true, _dvTipo:"rosado"});
    };
    inner.appendChild(btnDevTotal);
  }

  // ── Modal desbloqueo (dentro del detalle) ──
  if(state.passCliente === c) {
    const modal=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"999"}});

    box.appendChild(el("p",{style:{fontSize:"13px",color:"#888",margin:"0 0 16px",wordBreak:"break-all"}},c));
    const pWrap=el("div",{style:{position:"relative",marginBottom:"8px"}});
    const pInp=el("input",{type:state.verPassDesbloqueo?"text":"password",placeholder:"Contraseña",style:{...inp(),padding:"8px 36px 8px 10px"},autoFocus:true});
    pInp.value=state.passInput;

    pWrap.appendChild(pInp);
    pWrap.appendChild(el("button",{style:{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"16px",color:"#888",padding:"0"},onClick:()=>setState({verPassDesbloqueo:!state.verPassDesbloqueo})},state.verPassDesbloqueo?"🙈":"👁️"));
    box.appendChild(pWrap);
    if(state.passError) box.appendChild(el("p",{style:{color:"#c00",fontSize:"12px",margin:"0 0 10px"}},state.passError));
    const btns=el("div",{style:{display:"flex",gap:"10px",marginTop:"4px"}});
    btns.appendChild(el("button",{style:{flex:"1",background:"#1e3a5f",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 0",cursor:"pointer",fontWeight:"700"},onClick:intentarDesbloquear},"Desbloquear"));
    btns.appendChild(el("button",{style:{flex:"1",background:"#eee",color:"#555",border:"none",borderRadius:"8px",padding:"10px 0",cursor:"pointer"},onClick:()=>setState({passCliente:null,passInput:"",passError:""})},"Cancelar"));
    box.appendChild(btns); modal.appendChild(box); wrap.appendChild(modal);
  }

  // ── Botones de confirmación ──
  const estado = state.estadoEntrega[c] || null;
  const bloqueadoDetalle = state.bloqueados[c] || false;

  if(!esPresupuesto && !state.modoHistorial) {
    if(estado && bloqueadoDetalle) {
      const estadoLabel = estado==="verde"?"✅ Entrega efectiva":estado==="amarillo"?"🟡 Entrega parcial":"↩️ Devolución total";
      const estadoBg = estado==="verde"?"#e8f5e9":estado==="amarillo"?"#fffde7":"#fce4ec";
      const estadoColor = estado==="verde"?"#27ae60":estado==="amarillo"?"#f9a825":"#e91e8c";
      const estadoBox = el("div",{style:{background:estadoBg,borderRadius:"12px",padding:"14px 18px",marginBottom:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}});
      estadoBox.appendChild(el("span",{style:{fontWeight:"700",color:estadoColor,fontSize:"14px"}},estadoLabel));
      const unlockBtn = el("button",{style:{background:"#fff",border:"1px solid #ccc",borderRadius:"8px",padding:"7px 16px",cursor:"pointer",fontSize:"13px",fontWeight:"600",color:"#555"}},"🔓 Desbloquear");
      unlockBtn.onclick = () => setState({passCliente:c, passInput:"", passError:""});
      estadoBox.appendChild(unlockBtn);
      inner.appendChild(estadoBox);
    } else if(!estado) {
      const confirmBox=el("div",{style:{background:"#fff",borderRadius:"12px",padding:"18px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",marginBottom:"16px"}});
      confirmBox.appendChild(el("p",{style:{margin:"0 0 14px",fontWeight:"700",color:"#1e3a5f",fontSize:"14px"}},"✅ Confirmar entrega"));

      const tieneDevsParciales = devsCl.length > 0;

      // Si se presionó confirmar y hay devs, mostrar selector de motivo
      if(state.showDvForm && tieneDevsParciales){
        const motDiv=el("div",{style:{marginBottom:"12px"}});
        motDiv.appendChild(el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"4px"}},"Motivo de la devolución"));
        const motSel=el("select",{style:{width:"100%",padding:"8px 10px",borderRadius:"6px",border:"1px solid #ccc",fontSize:"13px",boxSizing:"border-box",fontFamily:"sans-serif"}});
        motSel.appendChild(el("option",{value:""},"-- Selecciona motivo --"));
        MOTIVOS.forEach(m=>motSel.appendChild(el("option",{value:m.codigo},`${m.codigo} — ${m.desc}`)));
        motSel.value = state.dvCodigo||"";
        motSel.onchange = e=>{ state.dvCodigo=e.target.value; };
        motDiv.appendChild(motSel);
        confirmBox.appendChild(motDiv);

        const btnFinal = document.createElement("button");
        const dvTipo = state._dvTipo || "amarillo";
        btnFinal.style.cssText=`width:100%;background:${dvTipo==="rosado"?"#e91e8c":"#f9a825"};color:#fff;border:none;border-radius:8px;padding:12px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif;margin-bottom:8px;`;
        btnFinal.textContent="✅ Confirmar";
        btnFinal.onclick = () => {
          if(!motSel.value){ alert("Selecciona un motivo."); return; }
          const motivo = MOTIVOS.find(x=>x.codigo===motSel.value)||{};
          const newDevs = state.devoluciones.map(d=>d.cliente===c?{...d,codigo:motivo.codigo,desc:motivo.desc}:d);
          setState({devoluciones:newDevs, dvCodigo:"D01", showDvForm:false, _dvTipo:undefined});
          confirmarDesdeDetalle(c, dvTipo, motivo.codigo, motivo.desc);
        };
        confirmBox.appendChild(btnFinal);
        confirmBox.appendChild(el("button",{style:{width:"100%",background:"#eee",color:"#555",border:"none",borderRadius:"8px",padding:"10px 0",fontSize:"13px",cursor:"pointer",fontFamily:"sans-serif"},onClick:()=>setState({showDvForm:false})},"Cancelar"));
      } else {
        // Botón único de confirmar
        const btnConfirmar = document.createElement("button");
        btnConfirmar.style.cssText="width:100%;background:#27ae60;color:#fff;border:none;border-radius:8px;padding:14px 0;font-size:14px;font-weight:700;cursor:pointer;font-family:sans-serif;";
        btnConfirmar.textContent="✅ Confirmar entrega";
        btnConfirmar.onclick = () => {
          if(tieneDevsParciales){
            // Verificar si todas las unidades entregables fueron devueltas → rosado
            const totalUnidadesEntregables = pedidosEntregables.reduce((s,[,p])=>s+p.lineas.filter(l=>!/^pre$/i.test(l.estPed||"")).reduce((ss,l)=>ss+l.unidades,0),0);
            const totalDevUnidades = devsCl.reduce((s,d)=>s+d.unidades,0);
            const esDevTotal = totalDevUnidades >= totalUnidadesEntregables;
            if(esDevTotal){
              setState({showDvForm:true, _dvTipo:"rosado"});
            } else {
              setState({showDvForm:true, _dvTipo:"amarillo"});
            }
          } else {
            confirmarDesdeDetalle(c,"verde");
          }
        };
        confirmBox.appendChild(btnConfirmar);
      }

      inner.appendChild(confirmBox);
    }
  } else if(estado && (state.modoHistorial || esPresupuesto)) {
    const estadoLabel = estado==="verde"?"✅ Entrega efectiva":estado==="amarillo"?"🟡 Entrega parcial":"↩️ Devolución total";
    const estadoBg = estado==="verde"?"#e8f5e9":estado==="amarillo"?"#fffde7":"#fce4ec";
    const estadoColor = estado==="verde"?"#27ae60":estado==="amarillo"?"#f9a825":"#e91e8c";
    inner.appendChild(el("div",{style:{background:estadoBg,borderRadius:"12px",padding:"14px 18px",marginBottom:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      el("span",{style:{fontWeight:"700",color:estadoColor,fontSize:"14px"}},estadoLabel),
      el("span",{style:{fontSize:"12px",color:"#888"}},"📋 Solo lectura")
    ));
  }

  return wrap;
}

    if(state.estadoEntrega[c]==="rosado") return s+totalesCliente(c).monto;
    return s+totalesCliente(c).devM;
  },0);
  const cntVerde=clientesEntregables.filter(c=>state.estadoEntrega[c]==="verde").length;

  const entregadosCount=cntVerde+cntAmarillo;
  const montoTotal=clientesEntregables.reduce((s,c)=>s+totalesCliente(c).monto,0);
  const pctEfectividad=clientesEntregables.length>0?Math.round((cntVerde+cntAmarillo)/clientesEntregables.length*100):0;
  const gral=totalesGral();
  const montoEntregado=clientesEntregables.filter(c=>state.estadoEntrega[c] && state.estadoEntrega[c]!=="rosado").reduce((s,c)=>s+totalesCliente(c).netoM,0);
  const montoPendiente=clientesEntregables.filter(c=>!state.estadoEntrega[c]).reduce((s,c)=>s+totalesCliente(c).netoM,0);
  const busquedaLower = state.busqueda.toLowerCase().trim();
  const clientesFiltrados = clientes.filter(c => {
    if(!busquedaLower) return true;
    // Buscar por nombre de cliente
    if(c.toLowerCase().includes(busquedaLower)) return true;
    // Buscar por producto en cualquier pedido del cliente
    const productos = Object.values(state.clienteMap[c]?.pedidos||{})
      .flatMap(p => p.lineas||[])
      .map(l => l.producto?.toLowerCase()||"");
    return productos.some(p => p.includes(busquedaLower));
  });
  const totalBilletes=BILLETES.reduce((s,b)=>s+b*(parseFloat(state.billetes[b])||0),0);
  const totalMonedas=parseFloat(state.monedas)||0;
  const totalEfectivo=totalBilletes+totalMonedas;
  const totalDeposito=parseFloat(state.deposito)||0;
  const totalTransferencia=parseFloat(state.transferencia)||0;
  const totalGastosDeCuenta=state.gastosDetalle.reduce((s,g)=>g.deCuenta?(s+(parseFloat(g.monto)||0)):s,0);
  const totalGastos=state.gastosDetalle.reduce((s,g)=>s+(parseFloat(g.monto)||0),0);
  const totalPagos=totalEfectivo+totalDeposito+totalTransferencia;
  // Total a cobrar solo de confirmados
  const totalACobrarConfirmado = Object.keys(state.clienteMap)
    .filter(c=>state.estadoEntrega[c] && state.estadoEntrega[c]!=="rosado")
    .reduce((s,c)=>s+totalesCliente(c).netoM,0);
  const diferencia=(totalPagos+totalGastosDeCuenta)-totalACobrarConfirmado;
  const porRuta={};
  clientesFiltrados.forEach(c=>{
    const r=state.clienteMap[c].ruta||"Sin ruta";
    if(!porRuta[r]) porRuta[r]=[];
    porRuta[r].push(c);
  });

  const wrap=el("div",{style:{fontFamily:"sans-serif",background:"#f4f6f9",minHeight:"100vh",padding:"24px"}});

  // Modal contraseña desbloqueo
  if(state.passCliente){
    const modal=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"999"}});
    const box=el("div",{style:{background:"#fff",borderRadius:"12px",padding:"28px",width:"320px",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}});
    box.appendChild(el("h3",{style:{margin:"0 0 6px",color:"#1e3a5f"}},"🔒 Desbloquear entrega"));
    box.appendChild(el("p",{style:{fontSize:"13px",color:"#888",margin:"0 0 16px",wordBreak:"break-all"}},state.passCliente));
    const pWrap=el("div",{style:{position:"relative",marginBottom:"8px"}});
    const pInp=el("input",{type:state.verPassDesbloqueo?"text":"password",placeholder:"Contraseña",style:{...inp(),padding:"8px 36px 8px 10px"},autoFocus:true});
    pInp.value=state.passInput;
    pInp.addEventListener('input', e=>{ state.passInput=e.target.value; });
    pInp.addEventListener('keydown', e=>{ if(e.key==="Enter") intentarDesbloquear(); });
    pWrap.appendChild(pInp);
    pWrap.appendChild(el("button",{style:{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"16px",color:"#888",padding:"0"},onClick:()=>setState({verPassDesbloqueo:!state.verPassDesbloqueo})},state.verPassDesbloqueo?"🙈":"👁️"));
    box.appendChild(pWrap);
    if(state.passError) box.appendChild(el("p",{style:{color:"#c00",fontSize:"12px",margin:"0 0 10px"}},state.passError));
    const btns=el("div",{style:{display:"flex",gap:"10px",marginTop:"4px"}});
    btns.appendChild(el("button",{style:{flex:"1",background:"#1e3a5f",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 0",cursor:"pointer",fontWeight:"700"},onClick:intentarDesbloquear},"Desbloquear"));
    btns.appendChild(el("button",{style:{flex:"1",background:"#eee",color:"#555",border:"none",borderRadius:"8px",padding:"10px 0",cursor:"pointer"},onClick:()=>setState({passCliente:null,passInput:"",passError:""})},"Cancelar"));
    box.appendChild(btns); modal.appendChild(box); wrap.appendChild(modal);
  }

  // Modal long press cliente → devolución total
  if(state.longPressModal){
    const lpm = state.longPressModal;
    const lModal=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"999",padding:"16px"}});
    const lBox=el("div",{style:{background:"#fff",borderRadius:"14px",padding:"28px",width:"100%",maxWidth:"360px",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}});
    lBox.appendChild(el("div",{style:{fontSize:"36px",textAlign:"center",marginBottom:"8px"}},"↩️"));
    lBox.appendChild(el("h3",{style:{margin:"0 0 4px",color:"#e91e8c",fontSize:"16px",textAlign:"center"}},"Devolución total"));

        const prods = Object.values(state.clienteMap[c]?.pedidos||{}).flatMap(p=>p.lineas||[]).map(l=>l.producto?.toLowerCase()||"");

      });
      const pr = {};
      cltsFilt.forEach(c=>{ const r=state.clienteMap[c].ruta||"Sin ruta"; if(!pr[r]) pr[r]=[]; pr[r].push(c); });

  busqWrap.appendChild(busq);
  const btnOcultar=el("button",{style:{whiteSpace:"nowrap",background:state.ocultarConfirmados?"#27ae60":"#eef2f7",color:state.ocultarConfirmados?"#fff":"#1e3a5f",border:"none",borderRadius:"8px",padding:"10px 14px",cursor:"pointer",fontSize:"13px",fontWeight:"700"}},state.ocultarConfirmados?"👁️ Ver todas":"✅ Ocultar confirmadas");

function renderListaRutas(container, porRuta) {
  Object.entries(porRuta).forEach(([ruta,rutaClientes])=>{
    const cntVerdeR=rutaClientes.filter(c=>state.estadoEntrega[c]==="verde").length;
    const cntAmarilloR=rutaClientes.filter(c=>state.estadoEntrega[c]==="amarillo").length;
    const cntRosadoR=rutaClientes.filter(c=>state.estadoEntrega[c]==="rosado").length;
    const rutaEntregables=rutaClientes.filter(c=>!esClientePre(c));
    const entregadosRuta=cntVerdeR+cntAmarilloR;
    const montoEntregadoRuta=rutaEntregables.filter(c=>state.estadoEntrega[c] && state.estadoEntrega[c]!=="rosado").reduce((s,c)=>s+totalesCliente(c).netoM,0);
    const montoPendienteRuta=rutaEntregables.filter(c=>!state.estadoEntrega[c]).reduce((s,c)=>s+totalesCliente(c).netoM,0);
    const montoTotalRuta=rutaEntregables.reduce((s,c)=>s+totalesCliente(c).monto,0);
    const netoRutaConfirmado=montoEntregadoRuta;
    const descRuta=rutaEntregables.reduce((s,c)=>s+totalesCliente(c).desc,0);
    const devTotalRuta=rutaEntregables.reduce((s,c)=>{
      if(state.estadoEntrega[c]==="rosado") return s+totalesCliente(c).monto;
      return s+totalesCliente(c).devM;
    },0);
    const pctEfectividadR=rutaEntregables.length>0?Math.round((cntVerdeR+cntAmarilloR)/rutaEntregables.length*100):0;
    const pctMontoRuta=montoTotalRuta>0?(Math.round(montoEntregadoRuta/montoTotalRuta*1000)/10).toFixed(1):0;
    const pctDevMontoRuta=montoTotalRuta>0?(Math.round(devTotalRuta/montoTotalRuta*1000)/10).toFixed(1):0;
    const cntPresupuestoR=rutaClientes.filter(c=>esClientePre(c)).length;

    const rutaClientesFiltrados = state.ocultarConfirmados
      ? rutaClientes.filter(c => !state.estadoEntrega[c] || esClientePre(c))
      : rutaClientes;

    // Si ocultar activo y todos confirmados en esta ruta, saltar la ruta
    if(state.ocultarConfirmados && rutaClientesFiltrados.length === 0) return;

    const rutaNombre = ruta.replace(/[\s—–-]+\d+\s*clientes?/i,"").trim();
    const rutaDiv=el("div",{style:{marginBottom:"24px"}});
    const rutaHdr=el("div",{style:{background:"#2d5f8a",color:"#fff",borderRadius:"10px 10px 0 0",padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}});
    const tituloCnt = cntPresupuestoR>0 ? `${rutaEntregables.length} clientes + ${cntPresupuestoR} presupuesto${cntPresupuestoR>1?"s":""}` : `${rutaClientes.length} clientes`;
    rutaHdr.appendChild(el("span",{style:{fontWeight:"700",fontSize:"15px"}},`🚚 ${rutaNombre} — ${tituloCnt}`));
    const rutaInfo=el("div",{style:{display:"flex",gap:"16px",fontSize:"12px",flexWrap:"wrap",alignItems:"center"}});
    rutaInfo.appendChild(el("span",{},`👥 ${entregadosRuta}/${rutaClientes.length} · ✅${cntVerdeR} 🟡${cntAmarilloR} 🔴${cntRosadoR}`));
    rutaInfo.appendChild(el("span",{style:{color:"#a8e6a3"}},`📊 Efect: ${pctEfectividadR}%`));
    rutaInfo.appendChild(el("span",{},[`✅ ${fQ(montoEntregadoRuta)} `,el("span",{style:{color:"#a8e6a3",fontSize:"11px"}},`${pctMontoRuta}%`),el("span",{style:{color:"#ffd580",marginLeft:"8px"}},`⏳ ${fQ(montoPendienteRuta)}`)]));
    if(devTotalRuta>0) rutaInfo.appendChild(el("span",{style:{color:"#ffaaaa"}},[`↩️ -${fQ(devTotalRuta)} `,el("span",{style:{fontSize:"11px",color:"#ffcccc"}},`${pctDevMontoRuta}%`)]));
    rutaInfo.appendChild(el("span",{style:{fontWeight:"700"}},`💰 ${fQ(netoRutaConfirmado)}`));
    rutaHdr.appendChild(rutaInfo); rutaDiv.appendChild(rutaHdr);

    const tblWrap=el("div",{style:{background:"#fff",borderRadius:"0 0 12px 12px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",overflow:"hidden"}});

    const t=el("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"13px"}});

    });
    thead.appendChild(tr); t.appendChild(thead);
    const tbody=el("tbody");
    rutaClientesFiltrados.forEach((cliente,ri)=>{
      const tt=totalesCliente(cliente);
      const entregado=state.entregados[cliente]||false;

      const estado = state.estadoEntrega[cliente] || null;
      const esPresupuesto = esClientePre(cliente);
      // Notas del vendedor de cualquier pedido del cliente

      // Color de fila según estado
      const rowBg = esPresupuesto?"#f0f0f0":estado==="verde"?"#e8f5e9":estado==="amarillo"?"#fffde7":estado==="rosado"?"#fce4ec":ri%2===0?"#fafbfc":"#fff";

      } else if(bloqueado){

        cb.onchange=()=>confirmarVerde(cliente);

      }
      row.appendChild(cbTd);

      // Nombre
      const nameTd=el("td",{style:{padding:"9px 12px"}});
      const nameBtn=document.createElement("button");
      nameBtn.style.cssText=`background:none;border:none;cursor:pointer;color:${esPresupuesto?"#666":"#1e3a5f"};font-weight:600;font-size:13px;text-decoration:underline;padding:0;text-align:left;font-family:sans-serif;`;
      nameBtn.textContent=cliente;
      // Long press en nombre → devolución total del cliente
      if(!esPresupuesto && !state.bloqueados[cliente] && !state.modoHistorial){
        let lpTimer=null;
        const startLp=()=>{ lpTimer=setTimeout(()=>{ lpTimer=null; devolverClienteTotal(cliente); },700); };
        const cancelLp=()=>clearTimeout(lpTimer);
        nameBtn.addEventListener("mousedown",startLp);

        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},fQ(tt.monto)));
        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},"-"));
        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},"-"));
        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},"-"));
        row.appendChild(el("td",{},""));
        tbody.appendChild(row);

      // Pedidos cell: cada pedido en rojo+asterisco si es Pre
      const pedTd=el("td",{style:{padding:"9px 12px",fontSize:"12px"}});

      pedEntries.forEach(([ped,pData],pi)=>{
        const esPre=esPedPre(pData);
        const span=document.createElement("span");
        span.textContent=(esPre?`*${ped}`:ped)+(pi<pedEntries.length-1?", ":"");

      row.appendChild(pedTd);

      // Dev: si es rosado (devolución total) mostrar el monto bruto; si no, mostrar devoluciones parciales
      const devMostrar = estado==="rosado" ? tt.monto : tt.devM;

      // Neto: blanco si no confirmado, Q0.00 si devolución total, normal si confirmado
      const netoVal = !estado ? "-" : estado==="rosado" ? fQ(0) : fQ(tt.netoM);
      const netoColor = estado==="rosado" ? "#e91e8c" : "#1e3a5f";
      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",fontWeight:"700",color:netoColor}},netoVal));
      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"center"}},tieneComentario?el("span",{title:state.comentarios[cliente],style:{cursor:"help",fontSize:"16px"}},"💬"):""));
      tbody.appendChild(row);
    });

    // Fila total ruta
    const totRow=el("tr",{style:{background:"#2d5f8a",color:"#fff"}});
    totRow.appendChild(el("td",{style:{padding:"10px 12px",fontWeight:"700"},colspan:"3"},`Total ${ruta}`));
    totRow.appendChild(el("td",{style:{padding:"10px 12px",textAlign:"right",fontWeight:"700"}},fQ(rutaEntregables.reduce((s,c)=>s+totalesCliente(c).monto,0))));
    totRow.appendChild(el("td",{style:{padding:"10px 12px",textAlign:"right",fontWeight:"700",color:"#ffaaaa"}},devTotalRuta>0?`-${fQ(devTotalRuta)}`:"-"));
    totRow.appendChild(el("td",{style:{padding:"10px 12px",textAlign:"right",fontWeight:"700",color:"#ffd580"}},descRuta>0?`-${fQ(descRuta)}`:"-"));
    totRow.appendChild(el("td",{style:{padding:"10px 12px",textAlign:"right",fontWeight:"700"}},netoRutaConfirmado>0?fQ(netoRutaConfirmado):"-"));
    totRow.appendChild(el("td",{}));
    tbody.appendChild(totRow);
    t.appendChild(tbody); tblScroll.appendChild(t); tblWrap.appendChild(tblScroll); rutaDiv.appendChild(tblWrap);
    container.appendChild(rutaDiv);
  });
}

  // Panel cuadre final
  const cuadre=el("div",{style:{background:"#fff",borderRadius:"12px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",padding:"20px",marginTop:"8px"}});

  BILLETES.forEach(b=>{
    const row=document.createElement("div");

      const sinConfirmar=clientes.filter(c=>!state.estadoEntrega[c] && !esClientePre(c));
      if(sinConfirmar.length>0){
        alert(`⚠️ Hay ${sinConfirmar.length} entrega(s) sin confirmar:\n\n${sinConfirmar.map(c=>`• ${c}`).join("\n")}\n\nPor favor confirma todas las entregas antes de liquidar.`);
        return;
      }
      setState({showConfirmar:true});
    }},"✅ Confirmar Liquidación"));
  }
  inner.appendChild(confirmDiv);
  return wrap;
}

// ── Render principal ──
function render() {
  const app=document.getElementById("app");
  app.innerHTML="";
  let content;
  if(!state.autenticado) content=renderLogin();
  else if(state.cargandoDatos) content=renderCargando();
  else if(state.screenAdmin==="usuarios") content=renderAdminUsuarios();
  else if(state.screen==="menu") content=renderMenu();
  else if(state.screen==="inicio") content=renderInicio();
  else if(state.screen==="nodatos") content=renderNoDatos();
  else if(state.screen==="upload") content=renderUpload();
  else if(state.screen==="historial") content=renderHistorial();
  else if(state.screen==="historialVista" && state.clienteDetalle) content=renderDetalleCliente();
  else if(state.screen==="confirmado") content=renderConfirmado();
  else if(state.screen==="opciones") content=renderOpciones();
  else if(state.screen==="historialVista") content=renderMain();
  else if(state.clienteDetalle) content=renderDetalleCliente();
  else content=renderMain();
  app.appendChild(content);
  // Scroll al cliente después de volver del detalle
  if(state.scrollAfterCliente) {
    const target = app.querySelector(`[data-cliente="${CSS.escape(state.scrollAfterCliente)}"]`);
    if(target) {
      setTimeout(()=>{ target.scrollIntoView({behavior:"smooth", block:"center"}); }, 80);
    }
    state.scrollAfterCliente = null;
  }
  // Restaurar foco en el buscador si estaba activo
  if(state._busqFocused) {
    const busqEl = app.querySelector('input[placeholder*="Buscar"]');
    if(busqEl) {
      busqEl.focus();
      const len = busqEl.value.length;
      busqEl.setSelectionRange(len, len);
    }
  }
}

  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;font-family:sans-serif;";

  box.addEventListener("click", e => e.stopPropagation());

  // Estado local: cada persona es objeto {nombre, alias}
  const toObj = v => typeof v === "string" ? {nombre:v, alias:""} : {nombre:v.nombre||"", alias:v.alias||""};

      panel.style.cssText = "padding:0 14px 14px;border-top:1px solid #eee;";

      const mkField = (lbl, val, ph, onChange) => {
        const l = document.createElement("label");
        l.textContent = lbl;
        l.style.cssText = "display:block;font-size:11px;font-weight:600;color:#888;margin:10px 0 3px;text-transform:uppercase;";
        const inp = document.createElement("input");
        inp.type = "text"; inp.value = val; inp.placeholder = ph;
        inp.style.cssText = "width:100%;padding:8px 10px;border-radius:8px;border:1px solid #ccc;font-size:13px;box-sizing:border-box;font-family:sans-serif;";
        inp.addEventListener("mousedown", e => e.stopPropagation());
        inp.addEventListener("input", e => { onChange(e.target.value); nombreSpan.textContent = arr[idx].nombre || "(sin nombre)"; });
        panel.appendChild(l); panel.appendChild(inp); return inp;
      };

      mkField("Nombre completo", persona.nombre, "Ej: Juan Pérez", v => { arr[idx].nombre = v; });
      mkField("Alias / Apodo", persona.alias, "Ej: Juancho", v => { arr[idx].alias = v; });
      card.appendChild(panel);
    }
    return card;
  };

  const renderContenido = () => {
    box.innerHTML = "";

    const titulo = document.createElement("h3");
    titulo.textContent = "🚚 Gestionar personal";
    titulo.style.cssText = "margin:0 0 4px;color:#1a6e3c;font-size:16px;";
    box.appendChild(titulo);
    const desc = document.createElement("p");
    desc.textContent = "Haz click en un nombre para ver o editar sus datos.";
    desc.style.cssText = "font-size:12px;color:#888;margin:0 0 18px;";
    box.appendChild(desc);

    // ── Repartidores ──
    const hRep = document.createElement("p");
    hRep.textContent = "🚚 Repartidores";
    hRep.style.cssText = "font-size:13px;font-weight:700;color:#1a6e3c;margin:0 0 8px;";
    box.appendChild(hRep);
    reps.forEach((_, idx) => {
      box.appendChild(cardPersona(reps, idx, "#1a6e3c",
        newIdx => { expandidoRep = newIdx; renderContenido(); },
        expandidoRep === idx
      ));
    });
    const btnAgrRep = document.createElement("button");
    btnAgrRep.textContent = "➕ Agregar repartidor";
    btnAgrRep.style.cssText = "width:100%;background:#e8f5e9;color:#1a6e3c;border:2px dashed #1a6e3c;border-radius:8px;padding:9px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif;margin-bottom:20px;";
    btnAgrRep.addEventListener("mousedown", e => e.stopPropagation());
    btnAgrRep.onclick = e => { e.stopPropagation(); reps.push({nombre:"",alias:""}); expandidoRep=reps.length-1; renderContenido(); };
    box.appendChild(btnAgrRep);

    // ── Auxiliares ──
    const hAux = document.createElement("p");
    hAux.textContent = "👷 Auxiliares";
    hAux.style.cssText = "font-size:13px;font-weight:700;color:#1565c0;margin:0 0 8px;";
    box.appendChild(hAux);
    auxs.forEach((_, idx) => {
      box.appendChild(cardPersona(auxs, idx, "#1565c0",
        newIdx => { expandidoAux = newIdx; renderContenido(); },
        expandidoAux === idx
      ));
    });
    const btnAgrAux = document.createElement("button");
    btnAgrAux.textContent = "➕ Agregar auxiliar";
    btnAgrAux.style.cssText = "width:100%;background:#e3f2fd;color:#1565c0;border:2px dashed #1565c0;border-radius:8px;padding:9px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif;margin-bottom:16px;";
    btnAgrAux.addEventListener("mousedown", e => e.stopPropagation());
    btnAgrAux.onclick = e => { e.stopPropagation(); auxs.push({nombre:"",alias:""}); expandidoAux=auxs.length-1; renderContenido(); };
    box.appendChild(btnAgrAux);

    const errP = document.createElement("p");
    errP.id = "modal-personal-err";
    errP.style.cssText = "color:#c00;font-size:12px;margin:0 0 10px;min-height:16px;";
    box.appendChild(errP);

    const btnRow = document.createElement("div");
    btnRow.style.cssText = "display:flex;gap:10px;";

    const btnGuardar = document.createElement("button");
    btnGuardar.textContent = "💾 Guardar";
    btnGuardar.style.cssText = "flex:1;background:#1a6e3c;color:#fff;border:none;border-radius:8px;padding:11px 0;font-size:14px;font-weight:700;cursor:pointer;font-family:sans-serif;";
    btnGuardar.addEventListener("mousedown", e => e.stopPropagation());
    btnGuardar.onclick = async e => {
      e.stopPropagation();
      const repsLimpios = reps.map(r=>({nombre:r.nombre.trim(),alias:r.alias.trim()})).filter(r=>r.nombre);
      const auxsLimpios = auxs.map(a=>({nombre:a.nombre.trim(),alias:a.alias.trim()})).filter(a=>a.nombre);
      btnGuardar.textContent = "Guardando..."; btnGuardar.disabled = true;
      try {
        const cfgActual = await fbGet("config") || {};
        await fbSet("config", {...cfgActual, personal:{repartidores:repsLimpios, auxiliares:auxsLimpios}});
        state.listaRepartidores = repsLimpios;
        state.listaAuxiliares = auxsLimpios;
        overlay.remove();
        showToast("✅ Personal actualizado","#27ae60");
      } catch(e2) {
        const ep = document.getElementById("modal-personal-err");
        if(ep) ep.textContent = "Error al guardar. Intenta de nuevo.";
        btnGuardar.textContent = "💾 Guardar"; btnGuardar.disabled = false;
      }
    };
    btnRow.appendChild(btnGuardar);

    const btnCancelar = document.createElement("button");
    btnCancelar.textContent = "Cancelar";
    btnCancelar.style.cssText = "flex:1;background:#eee;color:#555;border:none;border-radius:8px;padding:11px 0;font-size:14px;cursor:pointer;font-family:sans-serif;";
    btnCancelar.addEventListener("mousedown", e => e.stopPropagation());
    btnCancelar.onclick = e => { e.stopPropagation(); overlay.remove(); };
    btnRow.appendChild(btnCancelar);
    box.appendChild(btnRow);
  };

  renderContenido();
  overlay.appendChild(box);
  // Solo cerrar si el click es exactamente en el overlay oscuro, no en el box
  overlay.addEventListener("click", e => { if(e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}
