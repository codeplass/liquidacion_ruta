// ── Modal cambiar contraseña de desbloqueo ──
function abrirModalCambiarPassDesbloqueo() {
  const prev = document.getElementById("modal-pass-desbloqueo");
  if(prev) prev.remove();
  const overlay = document.createElement("div");
  overlay.id = "modal-pass-desbloqueo";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;font-family:sans-serif;";
  const box = document.createElement("div");
  box.style.cssText = "background:#fff;border-radius:14px;padding:28px;width:100%;max-width:380px;";
  const titulo = document.createElement("h3");
  titulo.textContent = "🔑 Contraseña de desbloqueo";
  titulo.style.cssText = "margin:0 0 6px;color:#c0392b;font-size:16px;";
  box.appendChild(titulo);
  const desc = document.createElement("p");
  desc.textContent = "Contraseña para desbloquear entregas ya confirmadas.";
  desc.style.cssText = "font-size:12px;color:#888;margin:0 0 18px;";
  box.appendChild(desc);
  const mkInp = (lbl,ph) => {
    const l=document.createElement("label"); l.textContent=lbl; l.style.cssText="display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:3px;text-transform:uppercase;";
    const i=document.createElement("input"); i.type="password"; i.placeholder=ph;
    i.style.cssText="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ccc;font-size:14px;box-sizing:border-box;font-family:sans-serif;margin-bottom:12px;";
    box.appendChild(l); box.appendChild(i); return i;
  };
  const iActual=mkInp("Contraseña actual","Contraseña actual");
  const iNueva=mkInp("Nueva contraseña","Nueva (mín. 4 caracteres)");
  const iConf=mkInp("Confirmar nueva","Repite la nueva contraseña");
  const errP=document.createElement("p"); errP.style.cssText="color:#c00;font-size:12px;margin:0 0 10px;min-height:16px;"; box.appendChild(errP);
  const btnRow=document.createElement("div"); btnRow.style.cssText="display:flex;gap:10px;";
  const btnG=document.createElement("button"); btnG.textContent="💾 Guardar";
  btnG.style.cssText="flex:1;background:#c0392b;color:#fff;border:none;border-radius:8px;padding:11px 0;font-size:14px;font-weight:700;cursor:pointer;font-family:sans-serif;";
  btnG.onclick=async()=>{
    const a=iActual.value.trim(),n=iNueva.value.trim(),c=iConf.value.trim();
    if(!a||!n||!c){errP.textContent="Completa todos los campos.";return;}
    if(a!==PASS_DESBLOQUEO){errP.textContent="La contraseña actual no es correcta.";return;}
    if(n.length<4){errP.textContent="Mínimo 4 caracteres.";return;}
    if(n!==c){errP.textContent="Las contraseñas no coinciden.";return;}
    btnG.textContent="Guardando..."; btnG.disabled=true;
    try {
      const cfg=await fbGet("config")||{};
      await fbSet("config",{...cfg,passDesbloqueo:n});
      PASS_DESBLOQUEO=n; overlay.remove(); showToast("✅ Contraseña de desbloqueo actualizada","#27ae60");
    } catch(e){ errP.textContent="Error al guardar."; btnG.textContent="💾 Guardar"; btnG.disabled=false; }
  };
  btnRow.appendChild(btnG);
  const btnC=document.createElement("button"); btnC.textContent="Cancelar";
  btnC.style.cssText="flex:1;background:#eee;color:#555;border:none;border-radius:8px;padding:11px 0;font-size:14px;cursor:pointer;font-family:sans-serif;";
  btnC.onclick=()=>overlay.remove();
  btnRow.appendChild(btnC); box.appendChild(btnRow);
  overlay.appendChild(box);
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
  setTimeout(()=>iActual.focus(),100);
}

// ── Modal gestionar tipos de devolución ──
function abrirModalMotivos() {
  const prev = document.getElementById("modal-motivos");
  if(prev) prev.remove();
  let motivosLocal = JSON.parse(JSON.stringify(MOTIVOS));
  const overlay = document.createElement("div");
  overlay.id = "modal-motivos";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;font-family:sans-serif;";
  const box = document.createElement("div");
  box.style.cssText = "background:#fff;border-radius:14px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;";

  const renderContenido = () => {
    box.innerHTML = "";
    const titulo=document.createElement("h3"); titulo.textContent="↩️ Tipos de devolución";
    titulo.style.cssText="margin:0 0 4px;color:#d35400;font-size:16px;"; box.appendChild(titulo);
    const desc=document.createElement("p"); desc.textContent="Agrega, edita o elimina los motivos de devolución disponibles.";
    desc.style.cssText="font-size:12px;color:#888;margin:0 0 16px;"; box.appendChild(desc);
    motivosLocal.forEach((m,idx)=>{
      const fila=document.createElement("div"); fila.style.cssText="display:flex;gap:8px;align-items:center;margin-bottom:10px;";
      const iCod=document.createElement("input"); iCod.type="text"; iCod.value=m.codigo; iCod.placeholder="Cód";
      iCod.style.cssText="width:70px;padding:8px 10px;border-radius:8px;border:1px solid #ccc;font-size:13px;box-sizing:border-box;font-family:sans-serif;flex-shrink:0;";
      iCod.addEventListener("input",e=>{motivosLocal[idx].codigo=e.target.value.toUpperCase().slice(0,5);iCod.value=motivosLocal[idx].codigo;});
      const iDesc=document.createElement("input"); iDesc.type="text"; iDesc.value=m.desc; iDesc.placeholder="Descripción";
      iDesc.style.cssText="flex:1;padding:8px 10px;border-radius:8px;border:1px solid #ccc;font-size:13px;box-sizing:border-box;font-family:sans-serif;";
      iDesc.addEventListener("input",e=>{motivosLocal[idx].desc=e.target.value;});
      const btnD=document.createElement("button"); btnD.textContent="🗑️";
      btnD.style.cssText="background:#fce4ec;border:none;border-radius:8px;padding:8px 10px;cursor:pointer;font-size:14px;flex-shrink:0;";
      btnD.onclick=()=>{if(!confirm("¿Eliminar \""+m.desc+"\"?"))return;motivosLocal.splice(idx,1);renderContenido();};
      fila.appendChild(iCod);fila.appendChild(iDesc);fila.appendChild(btnD);box.appendChild(fila);
    });
    const btnAgr=document.createElement("button"); btnAgr.textContent="➕ Agregar motivo";
    btnAgr.style.cssText="width:100%;background:#fff3e0;color:#d35400;border:2px dashed #d35400;border-radius:8px;padding:10px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif;margin-top:4px;margin-bottom:18px;";
    btnAgr.onclick=()=>{
      const nums=motivosLocal.map(m=>parseInt((m.codigo||"").replace(/[^0-9]/g,""))||0);
      const next="D"+String(Math.max(0,...nums)+1).padStart(2,"0");
      motivosLocal.push({codigo:next,desc:""}); renderContenido();
    };
    box.appendChild(btnAgr);
    const errP=document.createElement("p"); errP.style.cssText="color:#c00;font-size:12px;margin:0 0 10px;min-height:16px;"; box.appendChild(errP);
    const btnRow=document.createElement("div"); btnRow.style.cssText="display:flex;gap:10px;";
    const btnG=document.createElement("button"); btnG.textContent="💾 Guardar cambios";
    btnG.style.cssText="flex:1;background:#d35400;color:#fff;border:none;border-radius:8px;padding:11px 0;font-size:14px;font-weight:700;cursor:pointer;font-family:sans-serif;";
    btnG.onclick=async()=>{
      for(const m of motivosLocal){if(!m.codigo.trim()||!m.desc.trim()){errP.textContent="Todos deben tener código y descripción.";return;}}
      const cods=motivosLocal.map(m=>m.codigo.trim());
      if(new Set(cods).size!==cods.length){errP.textContent="Hay códigos repetidos.";return;}
      btnG.textContent="Guardando..."; btnG.disabled=true;
      try {
        const cfg=await fbGet("config")||{};
        await fbSet("config",{...cfg,motivos:motivosLocal});
        MOTIVOS=motivosLocal; overlay.remove(); showToast("✅ Tipos de devolución actualizados","#27ae60");
      } catch(e){errP.textContent="Error al guardar."; btnG.textContent="💾 Guardar cambios"; btnG.disabled=false;}
    };
    btnRow.appendChild(btnG);
    const btnC=document.createElement("button"); btnC.textContent="Cancelar";
    btnC.style.cssText="flex:1;background:#eee;color:#555;border:none;border-radius:8px;padding:11px 0;font-size:14px;cursor:pointer;font-family:sans-serif;";
    btnC.onclick=()=>overlay.remove(); btnRow.appendChild(btnC); box.appendChild(btnRow);
  };
  renderContenido();
  overlay.appendChild(box);
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

// ── Modal de usuario (independiente del ciclo render) ──
function abrirModalUsuario(usuarioExistente) {
  // Eliminar modal previo si existe
  const prev = document.getElementById("modal-usuario");
  if(prev) prev.remove();

  const editando = !!usuarioExistente;
  const datos = usuarioExistente ? {...usuarioExistente} : {nombre:"",email:"",pass:"",rol:"repartidor",id:null};

  const overlay = document.createElement("div");
  overlay.id = "modal-usuario";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;font-family:sans-serif;";

  const box = document.createElement("div");
  box.style.cssText = "background:#fff;border-radius:14px;padding:28px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;";

  const titulo = document.createElement("h3");
  titulo.textContent = editando ? "✏️ Editar usuario" : "➕ Nuevo usuario";
  titulo.style.cssText = "margin:0 0 20px;color:#6c3483;font-size:16px;";
  box.appendChild(titulo);

  // Helper campo
  const campo = (label, tipo, valorInicial, placeholder) => {
    const wrap = document.createElement("div");
    wrap.style.marginBottom = "14px";
    const lbl = document.createElement("label");
    lbl.textContent = label;
    lbl.style.cssText = "display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;";
    const inp = document.createElement("input");
    inp.type = tipo; inp.value = valorInicial; inp.placeholder = placeholder;
    inp.style.cssText = "width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ccc;font-size:14px;box-sizing:border-box;font-family:sans-serif;";
    wrap.appendChild(lbl); wrap.appendChild(inp);
    return {wrap, inp};
  };

  const {wrap:wNombre, inp:iNombre} = campo("Nombre de usuario","text",datos.nombre,"Ej: Juan");
  box.appendChild(wNombre);

  // Select rol
  const wRol = document.createElement("div"); wRol.style.marginBottom="14px";
  const lRol = document.createElement("label"); lRol.textContent="Rol";
  lRol.style.cssText="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;";
  const selRol = document.createElement("select");
  selRol.style.cssText="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ccc;font-size:14px;box-sizing:border-box;font-family:sans-serif;";
  [["repartidor","🚚 Repartidor"],["admin","👑 Administrador"]].forEach(([v,t])=>{
    const o=document.createElement("option"); o.value=v; o.textContent=t;
    if(datos.rol===v) o.selected=true;
    selRol.appendChild(o);
  });
  wRol.appendChild(lRol); wRol.appendChild(selRol); box.appendChild(wRol);

  // Correo (solo admin)
  const {wrap:wEmail, inp:iEmail} = campo("Correo (para recuperación de contraseña)","email",datos.email||"","correo@ejemplo.com");
  box.appendChild(wEmail);

  // Contraseña
  const passLabel = editando && datos.rol==="repartidor" ? "Nueva contraseña (vacío = no cambiar)" : "Contraseña";
  const passPlaceholder = datos.rol==="admin" ? "Mínimo 6 caracteres" : "Contraseña de acceso";
  const {wrap:wPass, inp:iPass} = campo(passLabel,"password",datos.pass||"",passPlaceholder);

  // Nota admin no puede cambiar pass aquí
  const notaAdmin = document.createElement("div");
  notaAdmin.style.cssText="background:#fff8e1;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#795548;";
  notaAdmin.textContent="💡 Para cambiar la contraseña del admin, usa '¿Olvidaste tu contraseña?' en el login.";

  const actualizarCamposRol = () => {
    const esAdmin = selRol.value === "admin";
    wEmail.style.display = esAdmin ? "block" : "none";
    if(editando && esAdmin) {
      if(wPass.parentNode) wPass.remove();
      if(!notaAdmin.parentNode) box.insertBefore(notaAdmin, errP.parentNode ? errP : btnRow);
    } else {
      if(notaAdmin.parentNode) notaAdmin.remove();
      if(!wPass.parentNode) box.insertBefore(wPass, errP.parentNode ? errP : btnRow);
    }
  };
  selRol.addEventListener("change", actualizarCamposRol);

  // Error
  const errP = document.createElement("p");
  errP.style.cssText="color:#c00;font-size:12px;margin:0 0 10px;display:none;";
  box.appendChild(errP);

  // Botones
  const btnRow = document.createElement("div");
  btnRow.style.cssText="display:flex;gap:10px;margin-top:4px;";
  const btnGuardar = document.createElement("button");
  btnGuardar.textContent="💾 Guardar";
  btnGuardar.style.cssText="flex:1;background:#6c3483;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:sans-serif;";
  const btnCancelar = document.createElement("button");
  btnCancelar.textContent="Cancelar";
  btnCancelar.style.cssText="flex:1;background:#eee;color:#555;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:sans-serif;";
  btnCancelar.addEventListener("click",()=>overlay.remove());
  btnRow.appendChild(btnGuardar); btnRow.appendChild(btnCancelar);
  box.appendChild(wPass); box.appendChild(btnRow);

  // Inicializar visibilidad
  actualizarCamposRol();

  btnGuardar.addEventListener("click", async () => {
    const nombre = iNombre.value.trim();
    const rol = selRol.value;
    const email = iEmail.value.trim();
    const pass = iPass.value.trim();
    const esAdmin = rol === "admin";

    errP.style.display="none";
    const mostrarError = (msg) => { errP.textContent=msg; errP.style.display="block"; };

    if(!nombre) { mostrarError("El nombre es requerido."); return; }
    if(esAdmin && !email) { mostrarError("El correo es requerido para el administrador."); return; }
    if(!editando && !pass) { mostrarError("La contraseña es requerida."); return; }
    if(esAdmin && !editando && pass.length < 6) { mostrarError("La contraseña debe tener mínimo 6 caracteres."); return; }

    btnGuardar.disabled=true; btnGuardar.textContent="Guardando...";
    try {
      let uid = datos.id;
      if(!editando) {
        if(esAdmin) {
          const cred = await auth.createUserWithEmailAndPassword(email, pass);
          uid = cred.user.uid;
          const adminPerfil = await fbGet("usuarios/"+state.usuarioActual.id);
          if(adminPerfil?.email) {
            const adminPass = prompt("Confirma tu contraseña de administrador para continuar:");
            if(adminPass) await auth.signInWithEmailAndPassword(adminPerfil.email, adminPass);
          }
          await fbSet("usuarios/"+uid, {id:uid, nombre, email, rol:"admin"});
        } else {
          uid = nombre.toLowerCase().replace(/[^a-z0-9]/g,"_")+"_"+Date.now();
          await fbSet("usuarios/"+uid, {id:uid, nombre, pass, rol:"repartidor"});
        }
      } else {
        const updates = {...datos, nombre, rol};
        if(esAdmin) updates.email = email;
        if(!esAdmin && pass) updates.pass = pass;
        await fbSet("usuarios/"+uid, updates);
      }
      const usu = await fbGet("usuarios") || {};
      state.adminUsuarios = usu;
      overlay.remove();
      render();
      showToast("✅ Usuario guardado","#27ae60");
    } catch(e) {
      let msg="Error al guardar.";
      if(e.code==="auth/email-already-in-use") msg="Ese correo ya está registrado.";
      else if(e.code==="auth/weak-password") msg="Contraseña muy débil (mín. 6 caracteres).";
      mostrarError(msg);
      btnGuardar.disabled=false; btnGuardar.textContent="💾 Guardar";
    }
  });

  overlay.appendChild(box);
  document.body.appendChild(overlay);
  setTimeout(()=>iNombre.focus(),100);
}

// ── Admin: gestión de usuarios ──
function renderAdminUsuarios() {
  const wrap=el("div",{style:{fontFamily:"sans-serif",background:"#f4f6f9",minHeight:"100vh",padding:"24px"}});
  const inner=el("div",{style:{maxWidth:"600px",margin:"0 auto"}});
  wrap.appendChild(inner);

  const hdr=el("div",{style:{background:"#6c3483",color:"#fff",borderRadius:"12px",padding:"16px 24px",marginBottom:"20px",display:"flex",justifyContent:"space-between",alignItems:"center"}});
  hdr.appendChild(el("div",{},[
    el("h1",{style:{margin:"0",fontSize:"20px"}},"👥 Usuarios"),
    el("p",{style:{margin:"4px 0 0",fontSize:"12px",opacity:"0.7"}},"Administrar acceso a la aplicación")
  ]));
  hdr.appendChild(el("button",{style:{background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",borderRadius:"8px",padding:"8px 16px",cursor:"pointer",fontSize:"13px",fontWeight:"700"},onClick:()=>setState({screenAdmin:null,screen:"menu"})},"← Volver"));
  inner.appendChild(hdr);

  // Botón nuevo usuario
  inner.appendChild(el("button",{style:{width:"100%",background:"#6c3483",color:"#fff",border:"none",borderRadius:"10px",padding:"12px",fontSize:"14px",fontWeight:"700",cursor:"pointer",marginBottom:"16px"},onClick:()=>abrirModalUsuario(null)},"+ Nuevo usuario"));

  // Lista de usuarios
  const usu = state.adminUsuarios || {};
  const lista = Object.values(usu);
  if(lista.length===0) {
    inner.appendChild(el("div",{style:{background:"#fff",borderRadius:"12px",padding:"32px",textAlign:"center",color:"#aaa"}},"No hay usuarios registrados."));
  } else {
    lista.sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||"")).forEach(u=>{
      const row=el("div",{style:{background:"#fff",borderRadius:"12px",padding:"16px 20px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"12px",boxShadow:"0 2px 6px rgba(0,0,0,0.06)"}});
      const ava=el("div",{style:{width:"40px",height:"40px",borderRadius:"50%",background:u.rol==="admin"?"#6c3483":"#2980b9",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:"0"}},u.rol==="admin"?"👑":"🚚");
      row.appendChild(ava);
      const info=el("div",{style:{flex:"1"}});
      info.appendChild(el("div",{style:{fontWeight:"700",color:"#1e3a5f",fontSize:"14px"}},u.nombre||u.email));
      info.appendChild(el("div",{style:{fontSize:"12px",color:"#888",marginTop:"2px"}},(u.rol==="admin"?"👑 Administrador":"🚚 Repartidor")+" · "+(u.email||"")));
      row.appendChild(info);
      const esCurrent = state.usuarioActual?.id === u.id;
      if(!esCurrent) {
        const acciones=el("div",{style:{display:"flex",gap:"8px"}});
        acciones.appendChild(el("button",{style:{background:"#eef2f7",border:"none",borderRadius:"6px",padding:"6px 12px",cursor:"pointer",fontSize:"12px",color:"#1e3a5f",fontWeight:"700"},onClick:()=>abrirModalUsuario({...u,editando:true})},"✏️"));
        acciones.appendChild(el("button",{style:{background:"#fdecea",border:"none",borderRadius:"6px",padding:"6px 12px",cursor:"pointer",fontSize:"12px",color:"#c0392b",fontWeight:"700"},onClick:()=>eliminarUsuario(u.id)},"🗑️"));
        row.appendChild(acciones);
      } else {
        row.appendChild(el("span",{style:{fontSize:"11px",color:"#27ae60",fontWeight:"700"}},"(tú)"));
      }
      inner.appendChild(row);
    });
  }
  return wrap;
}

// ── Arranque ──
// Si Firebase tarda más de 2 segundos, mostrar login de todas formas
setTimeout(()=>{ if(!_authResuelto) { _authResuelto=true; render(); } }, 2000);

auth.onAuthStateChanged(async (user) => {
  if(_loginEnProceso) return;
  _authResuelto = true;
  if(user && !state.autenticado) {
    try {
      const perfil = await fbGet("usuarios/"+user.uid);
      if(perfil && perfil.rol === "admin") {
        const usuario = {id:user.uid, nombre:perfil.nombre||user.email, rol:"admin", email:user.email};
        await iniciarSesionConUsuario(usuario);
        return;
      }
    } catch(e){}
  }
  if(!state.autenticado) render();
});
</script>
