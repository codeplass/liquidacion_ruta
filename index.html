// ── Helpers ──
const fQ = v => `Q ${Number(v||0).toLocaleString("es-GT",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fN = v => Number(v||0).toLocaleString("es-GT");
const hoy = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const toNum = v => { const n=parseFloat(String(v||"").replace(/[Q,\s]/g,"")); return isNaN(n)?0:n; };
const esRuta = v => typeof v==="string" && /^ruta\s*\d+/i.test(v.trim());
const esCliente = v => typeof v==="string" && /^PT\d+/i.test(v.trim());
const esProducto = v => typeof v==="string" && /^\[\d+\]/.test(v.trim());
const esPedido = v => typeof v==="string" && /^SO\d+/i.test(v.trim());
const esNota = v => typeof v==="string" && v.trim().startsWith("📝");

// ── Firebase helpers ──
async function fbGet(path) {
  const snap = await db.ref(path).once("value");
  return snap.val();
}
async function fbSet(path, data) {
  await db.ref(path).set(data);
}
async function fbRemove(path) {
  await db.ref(path).remove();
}

// ── Parse archivo ──
function parseFile(raw) {
  const map={};
  let ruta="",cliente="",pedidoDefault="";
  for(let i=0;i<raw.length;i++){
    const cells=Array.isArray(raw[i])?raw[i]:Object.values(raw[i]);
    const A=String(cells[0]||"").trim();
    const B=String(cells[1]||"").trim();
    if(cells.every(c=>c===""||c===null||c===undefined)) continue;
    if(esRuta(A)){ruta=A;continue;}
    if(esCliente(A)){
      const partes=A.split(/\s[—–-]+\s|\s{2,}/);
      const codigo=partes[0].trim();
      const nombre=partes.slice(1).join(" ").trim()||B;
      // El pedido en la fila del cliente puede ser "SO63077 / SO63089" (múltiples)
      // El pedido real de cada producto viene en columna C de la línea del producto
      const pedCol=String(cells[2]||"").trim();
      const primerPed=pedCol.split(/[/,\s]+/).map(x=>x.trim()).find(x=>esPedido(x)||/^[A-Z]{1,3}\d{4,}/i.test(x))||"S/N";
      cliente=nombre?`${codigo} - ${nombre}`:codigo;
      pedidoDefault=primerPed;
      if(!map[cliente]) map[cliente]={ruta,pedidos:{}};
      continue;
    }
    // Línea con valor: producto con código [nnn] O texto libre con unidades/monto distintos de cero
    const esLineaValor = A && !esRuta(A) && !esCliente(A) && !esNota(A) && cliente &&
      (esProducto(A) || (toNum(cells[4])!==0 || toNum(cells[5])!==0));
    if(esLineaValor){
      // Col C (índice 2): número de pedido del producto
      // Col D (índice 3): Est.ped ("Blo", "Pre", etc.)
      // Col E (índice 4): cantidad
      // Col F (índice 5): monto
      const pedProd=String(cells[2]||"").trim();
      const estPed=String(cells[3]||"").trim();
      const pedido=(esPedido(pedProd)||/^[A-Z]{1,3}\d{4,}/i.test(pedProd))?pedProd:pedidoDefault;
      const unidades=toNum(cells[4]);
      const monto=toNum(cells[5]);
      if(unidades!==0||monto!==0){
        if(!map[cliente].pedidos[pedido]) map[cliente].pedidos[pedido]={lineas:[],estPed:""};
        if(estPed) map[cliente].pedidos[pedido].estPed=estPed;
        map[cliente].pedidos[pedido].lineas.push({producto:A,unidades,monto,estPed});
      }
    }
    if(esNota(A)&&cliente){
      const textoNota=A.replace(/^📝\s*/,'').trim();
      if(textoNota){
        if(!map[cliente].pedidos[pedidoDefault]) map[cliente].pedidos[pedidoDefault]={lineas:[],estPed:""};
        map[cliente].pedidos[pedidoDefault].nota=textoNota;
      }
    }
  }
  // Post-proceso: un pedido es "Pre" si TODOS sus productos son Pre
  Object.values(map).forEach(cl=>{
    Object.values(cl.pedidos).forEach(ped=>{
      if(ped.lineas.length===0) return;
      const todosPre=ped.lineas.every(l=>/^pre$/i.test(l.estPed||""));
      ped.estPed=todosPre?"Pre":(ped.lineas.some(l=>/^blo$/i.test(l.estPed||""))?"Blo":"");
    });
  });
  return map;
}

    "motivosDevTotal","descuentos","comentarios","billetes","monedas",
    "deposito","transferencia","gastosDetalle"];

// ── Totales ──
// Helper: true si todos los pedidos del cliente son "Pre"
function esClientePre(c) {
  const pedidos = Object.values(state.clienteMap[c]?.pedidos||{});
  return pedidos.length > 0 && pedidos.every(p=>/^pre$/i.test(p.estPed||""));
}
// Helper: true si un pedido específico es "Pre"
const esPedPre = p => /^pre$/i.test(p?.estPed||"");

function totalesCliente(c) {
  let u=0,m=0;
  Object.values(state.clienteMap[c]?.pedidos||{}).forEach(p=>{
    if(esPedPre(p)) return; // excluir pedidos en presupuesto
    p.lineas.forEach(l=>{u+=l.unidades;m+=l.monto;});
  });
  const devs=state.devoluciones.filter(d=>d.cliente===c);
  const dU=devs.reduce((s,d)=>s+d.unidades,0),dM=devs.reduce((s,d)=>s+d.monto,0);
  const desc=parseFloat(state.descuentos[c])||0;
  return {unidades:u,monto:m,devU:dU,devM:dM,desc,netoU:u-dU,netoM:m-dM-desc};
}

function estadoCliente(c) {
  // verde: confirmado sin devoluciones
  // amarillo: confirmado con devoluciones parciales
  // rosado: devolucion total (neto = 0)
  // null: no confirmado
  const est = state.estadoEntrega[c];
  return est || null;
}

function totalesGral() {
  return Object.keys(state.clienteMap).reduce((acc,c)=>{
    if(esClientePre(c)) return acc;
    const t=totalesCliente(c);
    acc.unidades+=t.unidades;acc.monto+=t.monto;acc.devM+=t.devM;acc.desc+=t.desc;acc.netoM+=t.netoM;
    return acc;
  },{unidades:0,monto:0,devM:0,desc:0,netoM:0});
}

function prodsDisp(c,p) {
  return (state.clienteMap[c]?.pedidos?.[p]?.lineas||[]).map(l=>{
    const yU=state.devoluciones.filter(d=>d.cliente===c&&d.pedido===p&&d.producto===l.producto).reduce((s,d)=>s+d.unidades,0);
    const yM=state.devoluciones.filter(d=>d.cliente===c&&d.pedido===p&&d.producto===l.producto).reduce((s,d)=>s+d.monto,0);
    return {...l,dispU:l.unidades-yU,dispM:l.monto-yM};
  }).filter(l=>l.dispU>0);
}

function precioUnit(cliente,pedido,producto) {
  const linea=state.clienteMap[cliente]?.pedidos?.[pedido]?.lineas?.find(l=>l.producto===producto);
  if(!linea||linea.unidades===0) return 0;
  return linea.monto/linea.unidades;
}

async function procesarArchivo(file) {
  setState({error:""});
  try {
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    const map=parseFile(raw);
    if(!Object.keys(map).length){setState({error:"No se encontraron entregas."});return;}
    // Limpiar claves para Firebase (no permite . # $ / [ ])
    const cleanKey=k=>k.replace(/[.#$\/\[\]]/g,"_");
    const cleanMap={};
    Object.entries(map).forEach(([k,v])=>{
      const cleanPedidos={};
      Object.entries(v.pedidos||{}).forEach(([pk,pv])=>{cleanPedidos[cleanKey(pk)]={...pv,pedidoOriginal:pk};});
      cleanMap[cleanKey(k)]={...v,pedidos:cleanPedidos,nombreOriginal:k};
    });
    await fbSet("datos-dia",{clienteMap:cleanMap,fileName:file.name,fecha:state.fecha});
    setState({
      clienteMap:cleanMap,devoluciones:[],entregados:{},estadoEntrega:{},motivosDevTotal:{},descuentos:{},comentarios:{},bloqueados:{},
      deposito:"",transferencia:"",gastosDetalle:[{desc:"",monto:"",comentario:"",deCuenta:true}],
      billetes:Object.fromEntries(BILLETES.map(b=>[b,""])),monedas:"",confirmado:false,
      fileName:file.name,screen:"main",busqueda:""
    });
  } catch(e){setState({error:"Error: "+e.message});}
}

async function confirmarLiquidacion() {
  setState({guardando:true});
  try {
    const existing=await fbGet("historial")||{};
    // Calcular y guardar totales por cliente para el historial (excluir presupuestos)
    const clienteTotales = {};
    Object.keys(state.clienteMap).forEach(c => {
      if(esClientePre(c)) return;
      if(!state.estadoEntrega[c]) return;
      let m=0;
      Object.values(state.clienteMap[c].pedidos||{}).forEach(p=>p.lineas.forEach(l=>{m+=l.monto;}));
      const devM=state.devoluciones.filter(d=>d.cliente===c).reduce((s,d)=>s+d.monto,0);
      const desc=parseFloat(state.descuentos[c])||0;
      clienteTotales[c] = m - devM - desc;
    });
    const totalNeto = Object.values(clienteTotales).reduce((s,v)=>s+v,0);

    existing[state.fecha]={
      fecha:state.fecha,fileName:state.fileName,
      entregados:state.entregados,
      estadoEntrega:state.estadoEntrega,
      motivosDevTotal:state.motivosDevTotal,
      devoluciones:state.devoluciones,
      descuentos:state.descuentos,comentarios:state.comentarios,
      deposito:state.deposito,transferencia:state.transferencia,
      gastosDetalle:state.gastosDetalle,billetes:state.billetes,monedas:state.monedas,
      clienteTotales, totalNeto,
      clienteMap: state.clienteMap
    };
    await fbSet("historial",existing);
    // Guardar datos-dia con flag confirmado (no borrar, para poder reabrir)
    const datosActuales = await fbGet("datos-dia");
    if(datosActuales) await fbSet("datos-dia", {...datosActuales, confirmado:true});
    setState({confirmado:true,showConfirmar:false,guardando:false,screen:"confirmado"});
  } catch(e){
    console.error(e);
    setState({guardando:false,showConfirmar:false});
    alert("❌ Error al guardar la liquidación:\n" + e.message);
  }
}

async function exportarExcel(reg) {
  const wb=XLSX.utils.book_new();
  const devs=reg.devoluciones||[];
  const descs=reg.descuentos||{};
  const coments=reg.comentarios||{};
  const estadoEnt=reg.estadoEntrega||reg.entregados||{};
  const cMap=reg.clienteMap||{};
  const gastos=reg.gastosDetalle||[];
  const billetes=reg.billetes||{};
  const clts=[...new Set([...Object.keys(estadoEnt),...Object.keys(cMap),...devs.map(d=>d.cliente)])].filter(Boolean).filter(c=>{ const ps=Object.values(cMap[c]?.pedidos||{}); return !(ps.length>0&&ps.every(p=>/^pre$/i.test(p.estPed||""))); }).sort();

  // ── Hoja 1: Resumen ──
  // Fix obs.2: devoluciones siempre se muestran en columna Devoluciones (positivo),
  // Total neto = bruto - devoluciones - descuentos
  let sB=0,sD=0,sDe=0,sN=0;
  const resRows=[["Ruta","Cliente","Estado","Total bruto Q","Devoluciones Q","Descuento Q","Total neto Q","Comentario"]];
  const cltsSorted=[...clts].sort((a,b)=>{
    const ra=cMap[a]?.ruta||"ZZZ", rb=cMap[b]?.ruta||"ZZZ";
    return ra.localeCompare(rb);
  });
  cltsSorted.forEach(c=>{
    const ruta=cMap[c]?.ruta||"";
    const est=estadoEnt[c];
    const lbl=est==="verde"?"Entregado":est==="amarillo"?"Parcial":est==="rosado"?"Dev. total":"Pendiente";
    let bruto=0; Object.values(cMap[c]?.pedidos||{}).forEach(p=>p.lineas.forEach(l=>{bruto+=l.monto;}));
    // Devoluciones: si rosado = bruto completo; si amarillo = devs parciales registradas
    const dv = est==="rosado" ? bruto : devs.filter(d=>d.cliente===c).reduce((s,d)=>s+d.monto,0);
    const dc = est==="rosado" ? 0 : (parseFloat(descs[c])||0);
    const nt = bruto - dv - dc;
    sB+=bruto; sD+=dv; sDe+=dc; sN+=nt;
    // dv como positivo en la columna, neto ya refleja la resta
    resRows.push([ruta,c,lbl,bruto,dv>0?dv:0,dc>0?dc:0,nt,coments[c]||""]);
  });
  resRows.push(["","TOTAL","",sB,sD,sDe,sN,""]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(resRows),"Resumen");

  // ── Hoja 2: Productos ──
  // Fix obs.3a: agregar columna Estado de entrega
  // Fix obs.3b: unidades/monto devueltos correctos (incluyendo devolución total = todas las unidades)
  const pRows=[["Ruta","Cliente","Estado","Pedido","Producto","Unid pedidas","Monto Q","Unid devueltas","Monto dev Q","Unid netas","Monto neto Q"]];
  const cltsP=[...clts].sort((a,b)=>{
    const ra=cMap[a]?.ruta||"ZZZ", rb=cMap[b]?.ruta||"ZZZ";
    return ra.localeCompare(rb);
  });
  cltsP.forEach(c=>{
    const ruta=cMap[c]?.ruta||"";
    const est=estadoEnt[c];
    const lbl=est==="verde"?"Entregado":est==="amarillo"?"Parcial":est==="rosado"?"Dev. total":"Pendiente";
    const esRosado = est==="rosado";
    Object.entries(cMap[c]?.pedidos||{}).forEach(([ped,pd])=>{
      pd.lineas.forEach(l=>{
        let du,dm;
        if(esRosado){
          // Devolución total: todas las unidades y monto del producto
          du=l.unidades; dm=l.monto;
        } else {
          const dv=devs.filter(d=>d.cliente===c&&d.pedido===ped&&d.producto===l.producto);
          du=dv.reduce((s,d)=>s+d.unidades,0);
          dm=dv.reduce((s,d)=>s+d.monto,0);
        }
        pRows.push([ruta,c,lbl,ped,l.producto,l.unidades,l.monto,du||0,dm||0,l.unidades-du,l.monto-dm]);
      });
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pRows),"Productos");

  // ── Hoja 3: Devoluciones ──
  // Fix obs.3b: incluir devoluciones totales (rosados) aunque no tengan registro línea a línea
  const dRows=[["Cliente","Estado","Pedido","Producto","Unidades","Monto Q","Codigo","Motivo"]];
  // Primero devs parciales registradas
  const MOTIVOS_MAP_EXP={"D01":"Cliente rechazó el pedido","D02":"Producto incorrecto","D03":"Sin dinero","D04":"Cerrado"};
  devs.forEach(d=>{
    const est=estadoEnt[d.cliente];
    const lbl=est==="amarillo"?"Parcial":est==="rosado"?"Dev. total":"Dev. parcial";
    // Para rosados, el motivo real está en motivosDevTotal; para parciales en d.desc
    const motivoRosado = est==="rosado" ? (reg.motivosDevTotal?.[d.cliente]||{}) : null;
    const codigo = motivoRosado?.codigo || d.codigo || "D01";
    const descFinal = motivoRosado?.desc || d.desc || MOTIVOS_MAP_EXP[codigo] || codigo || "";
    dRows.push([d.cliente,lbl,d.pedido,d.producto,d.unidades,d.monto,codigo,descFinal]);
  });
  // Luego rosados sin devs registradas línea a línea (devolución total implícita)
  clts.forEach(c=>{
    if(estadoEnt[c]!=="rosado") return;
    const yaRegistrado = devs.some(d=>d.cliente===c);
    if(yaRegistrado) return; // ya aparece arriba
    const motivo=reg.motivosDevTotal?.[c]||{};
    const codigoMot = motivo.codigo||"D01";
    const descMot = motivo.desc || MOTIVOS_MAP_EXP[codigoMot] || "Devolución total";
    Object.entries(cMap[c]?.pedidos||{}).forEach(([ped,pd])=>{
      pd.lineas.forEach(l=>{
        dRows.push([c,"Dev. total",ped,l.producto,l.unidades,l.monto,codigoMot,descMot]);
      });
    });
  });
  if(dRows.length>1) XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(dRows),"Devoluciones");

  // ── Hoja 4: Cuadre Final ──
  const tB=[1,5,10,20,50,100,200].reduce((s,b)=>s+b*(parseFloat(billetes[b])||0),0);
  const mon=parseFloat(reg.monedas)||0,tEf=tB+mon;
  const tDep=parseFloat(reg.deposito)||0,tTra=parseFloat(reg.transferencia)||0;
  const tGas=gastos.reduce((s,g)=>s+(parseFloat(g.monto)||0),0);
  const tGasDeCuenta=gastos.reduce((s,g)=>g.deCuenta?(s+(parseFloat(g.monto)||0)):s,0);
  const tGasBodega=tGas-tGasDeCuenta;
  const tPag=tEf+tDep+tTra,nRec=tPag-tGasDeCuenta,dif=nRec-sN;
  const cuadreRows=[
    ["CUADRE FINAL - "+(reg.fecha||"")],[],["BILLETES","Cantidad","Total Q"],
    ...[1,5,10,20,50,100,200].map(b=>{const c=parseFloat(billetes[b])||0;return c>0?["Q"+b,c,b*c]:null;}).filter(Boolean),
    ["Subtotal billetes","",tB],["Monedas","",mon],["Total efectivo","",tEf],
    [],[" OTROS PAGOS","",""],["Deposito bancario","",tDep],["Transferencia","",tTra],
    [],[" GASTOS DE RUTA","Descripcion","Monto Q","De cuenta (✓=si)"],
    ...gastos.filter(g=>parseFloat(g.monto)).map(g=>[g.comentario||"",g.desc||"",parseFloat(g.monto),g.deCuenta?"✓":"—"]),
    ["Gastos de ruta (bodega)","",tGasBodega],["Gastos de ruta (de cuenta)","",tGasDeCuenta],["Total gastos","",tGas],
    [],[" RESUMEN","",""],
    ["Total a entregar (bruto)","",sB],["(-) Devoluciones","",-sD],["(-) Descuentos","",-sDe],["Total neto a cobrar","",sN],
    [],[" PAGOS RECIBIDOS","",""],
    ["Total pagos recibidos","",tPag],["(-) Gastos de ruta de cuenta","",-tGasDeCuenta],["Neto recibido","",nRec],
    [],[Math.abs(dif)<0.01?"✓ CUADRADO":dif>0?"SOBRANTE":"FALTANTE","DIFERENCIA",dif],
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cuadreRows),"Cuadre Final");
  XLSX.writeFile(wb,"Liquidacion_"+(reg.fecha||"").replace(/[/]/g,"-")+".xlsx");
}

function guardarDev() {
  if(!state.dvPedido||!state.dvProducto){setState({dvError:"Selecciona pedido y producto."});return;}
  const u=parseFloat(state.dvUnidades)||0,m=parseFloat(state.dvMonto)||0;
  if(u<=0||m<=0){setState({dvError:"Ingresa unidades válidas."});return;}
  const prod=prodsDisp(state.clienteDetalle,state.dvPedido).find(p=>p.producto===state.dvProducto);
  if(!prod){setState({dvError:"Producto no disponible."});return;}
  if(u>prod.dispU){setState({dvError:`Máximo: ${prod.dispU} unidades.`});return;}
  if(m>prod.dispM+0.01){setState({dvError:`Máximo: ${fQ(prod.dispM)}.`});return;}
  const motivo=MOTIVOS.find(x=>x.codigo===state.dvCodigo);
  setState({
    devoluciones:[...state.devoluciones,{id:Date.now(),cliente:state.clienteDetalle,pedido:state.dvPedido,producto:state.dvProducto,unidades:u,monto:m,codigo:state.dvCodigo,desc:motivo.desc}],
    dvPedido:"",dvProducto:"",dvUnidades:"",dvMonto:"",dvCodigo:"D01",dvError:"",showDvForm:false
  });
}

function intentarDesbloquear() {
  if(state.passInput===PASS_DESBLOQUEO){
    const c=state.passCliente;
    const tipoAnterior=state.estadoEntrega[c];

    const nuevoBloq={...state.bloqueados}; delete nuevoBloq[c];
    const nuevoEstado={...state.estadoEntrega}; delete nuevoEstado[c];
    const nuevoEnt={...state.entregados}; delete nuevoEnt[c];

    const updates={bloqueados:nuevoBloq, estadoEntrega:nuevoEstado, entregados:nuevoEnt, passCliente:null, passInput:"", passError:""};

    // Si era devolución total: limpiar motivo guardado
    if(tipoAnterior==="rosado"){
      const nuevosMot={...state.motivosDevTotal}; delete nuevosMot[c];
      updates.motivosDevTotal=nuevosMot;
    }

    // Si era entrega parcial: borrar devoluciones de ese cliente
    if(tipoAnterior==="amarillo"){
      updates.devoluciones=state.devoluciones.filter(d=>d.cliente!==c);
    }

    setState(updates);
  } else {
    setState({passError:"Contraseña incorrecta."});
  }
}


// ── Mover producto entre clientes ──
function ejecutarMoverProducto() {
  const {moverOrigenCliente, moverOrigenPedido, moverProductoSel, moverDestinoCliente, moverDestinoPedido} = state;
  if(!moverOrigenCliente||!moverOrigenPedido||!moverProductoSel||!moverDestinoCliente||!moverDestinoPedido){
    setState({moverError:"Completa todos los campos."}); return;
  }
  if(moverOrigenCliente===moverDestinoCliente && moverOrigenPedido===moverDestinoPedido){
    setState({moverError:"El origen y destino son iguales."}); return;
  }
  const newMap = JSON.parse(JSON.stringify(state.clienteMap));
  const lineasOrigen = newMap[moverOrigenCliente]?.pedidos?.[moverOrigenPedido]?.lineas;
  if(!lineasOrigen){setState({moverError:"Pedido origen no encontrado."}); return;}
  const idx = lineasOrigen.findIndex(l=>l.producto===moverProductoSel);
  if(idx===-1){setState({moverError:"Producto no encontrado en origen."}); return;}
  const [linea] = lineasOrigen.splice(idx,1);
  if(!newMap[moverDestinoCliente]){setState({moverError:"Cliente destino no encontrado."}); return;}
  if(!newMap[moverDestinoCliente].pedidos[moverDestinoPedido]){
    newMap[moverDestinoCliente].pedidos[moverDestinoPedido]={lineas:[],estPed:""};
  }
  newMap[moverDestinoCliente].pedidos[moverDestinoPedido].lineas.push(linea);
  setState({clienteMap:newMap, showMoverProd:false, moverOrigenCliente:"", moverOrigenPedido:"", moverProductoSel:"", moverDestinoCliente:"", moverDestinoPedido:"", moverError:""});
  showToast("Producto movido correctamente","#1e3a5f");
}

function actualizarResumen() {
  const resDiv = document.getElementById("resumen-cuadre");
  const totalBilletes2 = [1,5,10,20,50,100,200].reduce((s,b)=>s+b*(parseFloat(state.billetes[b])||0),0);
  const totalMonedas2 = parseFloat(state.monedas)||0;
  const totalEfectivo2 = totalBilletes2 + totalMonedas2;
  const totalDeposito2 = parseFloat(state.deposito)||0;
  const totalTransferencia2 = parseFloat(state.transferencia)||0;
  const totalGastosDeCuenta2 = state.gastosDetalle.reduce((s,g)=>g.deCuenta?(s+(parseFloat(g.monto)||0)):s,0);
  const totalGastosBodega2 = state.gastosDetalle.reduce((s,g)=>!g.deCuenta?(s+(parseFloat(g.monto)||0)):s,0);
  const totalGastos2 = totalGastosDeCuenta2 + totalGastosBodega2;
  const totalPagos2 = totalEfectivo2 + totalDeposito2 + totalTransferencia2;

  // Total a Entregar: bruto de clientes entregables (excluir presupuestos)
  const totalAEntregar = Object.keys(state.clienteMap).reduce((acc,c)=>{
    if(esClientePre(c)) return acc;
    let m=0; Object.values(state.clienteMap[c].pedidos||{}).filter(p=>!esPedPre(p)).forEach(p=>p.lineas.forEach(l=>{m+=l.monto;}));
    return acc + m;
  },0);
  // Devoluciones: parciales + bruto de rosados (excluir presupuestos)
  const totalDevCuadre = Object.keys(state.clienteMap).reduce((acc,c)=>{
    if(esClientePre(c)) return acc;
    if(state.estadoEntrega[c]==="rosado"){
      let m=0; Object.values(state.clienteMap[c].pedidos||{}).forEach(p=>p.lineas.forEach(l=>{m+=l.monto;}));
      return acc + m;
    }
    return acc + state.devoluciones.filter(d=>d.cliente===c).reduce((s,d)=>s+d.monto,0);
  },0);
  // Descuentos: solo confirmados verde+amarillo (excluir presupuestos)
  const totalDescCuadre = Object.keys(state.clienteMap).reduce((acc,c)=>{
    if(esClientePre(c)) return acc;
    if(!state.estadoEntrega[c]||state.estadoEntrega[c]==="rosado") return acc;
    return acc + (parseFloat(state.descuentos[c])||0);
  },0);
  // Total Neto: Total a Entregar - Devoluciones - Descuentos
  const totalNetoCuadre = totalAEntregar - totalDevCuadre - totalDescCuadre;

  const diferencia2 = (totalPagos2 + totalGastosDeCuenta2) - totalNetoCuadre;
  resDiv.innerHTML = "";
  [
    {label:"Total a Entregar", val:fQ(totalAEntregar), color:"#1e3a5f", bold:true},
    {label:"(-) Devoluciones", val:`-${fQ(totalDevCuadre)}`, color:"#c0392b"},
    {label:"(-) Descuentos", val:`-${fQ(totalDescCuadre)}`, color:"#e67e22"},
    {label:"Total Neto", val:fQ(totalNetoCuadre), color:"#1e3a5f", bold:true, sep:true},
    {label:"Efectivo", val:fQ(totalEfectivo2), color:"#333"},
    {label:"Depósito", val:fQ(totalDeposito2), color:"#333"},
    {label:"Transferencia", val:fQ(totalTransferencia2), color:"#333"},
    {label:"Total recibido", val:fQ(totalPagos2), color:"#2563eb", bold:true},
    {label:"Gastos de ruta ≠ cuenta", val:totalGastosBodega2>0?`-${fQ(totalGastosBodega2)}`:"Q 0.00", color:"#e67e22"},
    {label:"Gastos de ruta de la cuenta", val:totalGastosDeCuenta2>0?`-${fQ(totalGastosDeCuenta2)}`:"Q 0.00", color:"#c0392b"},
  ].forEach(x=>{
    const row=document.createElement("div");
    row.style.cssText=`display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #e2e8f0;${x.sep?"margin-top:6px;border-top:2px solid #1e3a5f;padding-top:6px;":""}`;
    const lbl=document.createElement("span"); lbl.style.color="#666"; lbl.textContent=x.label;
    const val=document.createElement("span"); val.style.cssText=`font-weight:${x.bold?"700":"600"};color:${x.color};`; val.textContent=x.val;
    row.appendChild(lbl); row.appendChild(val); resDiv.appendChild(row);
  });
  const difDiv=document.createElement("div");
  difDiv.style.cssText="margin-top:10px;text-align:center;padding:10px 0;";
  const difLabel=document.createElement("div"); difLabel.style.cssText="font-size:11px;color:#888;margin-bottom:3px;"; difLabel.textContent="DIFERENCIA";
  const difVal=document.createElement("div");
  const difColor=Math.abs(diferencia2)<0.01?"#27ae60":diferencia2>0?"#2563eb":"#c0392b";
  difVal.style.cssText=`font-size:22px;font-weight:700;color:${difColor};`;
  difVal.textContent=Math.abs(diferencia2)<0.01?"✓ CUADRADO":diferencia2>0?`+${fQ(diferencia2)} SOBRANTE`:`-${fQ(Math.abs(diferencia2))} FALTANTE`;
  difDiv.appendChild(difLabel); difDiv.appendChild(difVal);
  resDiv.appendChild(difDiv);
  // Autosave cuadre en Firebase
  clearTimeout(window._autoSaveCuadre);
  window._autoSaveCuadre = setTimeout(async () => {
    try {
      const actual = await fbGet("datos-dia");
      if(actual) {
        await fbSet("datos-dia", {
          ...actual,
          billetes: state.billetes,
          monedas: state.monedas,
          deposito: state.deposito,
          transferencia: state.transferencia,
          gastosDetalle: state.gastosDetalle
        });
      }
    } catch(e) { console.warn("AutoSave cuadre error:", e); }
  }, 1500);
}

// ── Render helpers ──
const s = (styles) => Object.entries(styles).map(([k,v])=>`${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(';');

function el(tag, attrs={}, ...children) {
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") e.style.cssText=s(v);
    else if(k.startsWith("on")) e[k.toLowerCase()]=v;
    else if(k==="checked") e.checked=v;
    else if(k==="disabled") e.disabled=v;
    else if(k==="autoFocus") { if(v) setTimeout(()=>e.focus(),50); }
    else e.setAttribute(k,v);
  });
  children.flat().forEach(child=>{
    if(child==null||child===false) return;
    e.appendChild(typeof child==="string"?document.createTextNode(child):child);
  });
  return e;
}

  passInp.style.cssText = "width:100%;padding:10px 40px 10px 12px;border-radius:8px;border:1px solid #ccc;font-size:14px;box-sizing:border-box;font-family:sans-serif;";
  passInp.addEventListener("input", e => { state.appPass = e.target.value; });
  passInp.addEventListener("keydown", e => { if(e.key==="Enter") iniciarSesion(); });
  setTimeout(()=>passInp.focus(), 100);

  const eyeBtn = document.createElement("button");
  eyeBtn.type = "button";
  eyeBtn.textContent = state.verPass ? "🙈" : "👁️";
  eyeBtn.style.cssText = "position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#888;padding:0;line-height:1;";
  eyeBtn.addEventListener("click", () => {
    state.verPass = !state.verPass;
    passInp.type = state.verPass ? "text" : "password";
    eyeBtn.textContent = state.verPass ? "🙈" : "👁️";
  });

  passWrap.appendChild(passInp);
  passWrap.appendChild(eyeBtn);
  box.appendChild(passWrap);

  if(state.appPassError) {
    const errP = el("p",{style:{color:"#c00",fontSize:"12px",margin:"0 0 10px"}},state.appPassError);
    box.appendChild(errP);
  }

  const loginBtn = document.createElement("button");
  loginBtn.textContent = "Ingresar";
  loginBtn.style.cssText = "width:100%;background:#1e3a5f;color:#fff;border:none;border-radius:8px;padding:11px 0;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;font-family:sans-serif;";
  loginBtn.addEventListener("click", iniciarSesion);
  box.appendChild(loginBtn);

  wrap.appendChild(box);
  return wrap;
}

function cargarFechaHistorial(fecha) {
  const reg=state.historialData[fecha];
  if(!reg) return;
  setState({
    fechaSelec:fecha, screen:"historialVista",
    clienteMap:reg.clienteMap||{}, fileName:reg.fileName||"", fecha:reg.fecha||fecha,
    devoluciones:reg.devoluciones||[],
    estadoEntrega:reg.estadoEntrega||reg.entregados||{},
    motivosDevTotal:reg.motivosDevTotal||{},
    descuentos:reg.descuentos||{}, comentarios:reg.comentarios||{},
    deposito:reg.deposito||"", transferencia:reg.transferencia||"",
    gastosDetalle:reg.gastosDetalle||[{desc:"",monto:"",comentario:""}],

  const pedidosEntregables=pedidos.filter(([,p])=>!esPedPre(p));

  inner.appendChild(hdr);

  // Banner informativo si tiene al menos un pedido en presupuesto (pero no todos)
  const tienePedidosPre = pedidos.some(([,p])=>esPedPre(p));

    inner.appendChild(el("div",{style:{background:"#f5f5f5",border:"1px solid #bdbdbd",borderRadius:"10px",padding:"12px 18px",marginBottom:"16px",display:"flex",alignItems:"center",gap:"10px",fontSize:"13px",color:"#555"}},
      el("span",{style:{fontSize:"18px"}},"📋"),
      el("span",{},"Este cliente tiene pedido(s) en presupuesto (marcados en gris). Esos productos no se entregan y no suman en los totales.")
    ));
  }
  if(esPresupuesto){
    inner.appendChild(el("div",{style:{background:"#f5f5f5",border:"1px solid #bdbdbd",borderRadius:"10px",padding:"12px 18px",marginBottom:"16px",display:"flex",alignItems:"center",gap:"10px",fontSize:"13px",color:"#555"}},
      el("span",{style:{fontSize:"18px"}},"📋"),
      el("span",{},"Este cliente quedó en presupuesto. Los productos se muestran solo para consulta, no se entregaron.")
    ));
  }

  // Pedidos
  pedidos.forEach(([pedido,pData])=>{
    const pedEsPre = esPedPre(pData);
    const pm=pData.lineas.reduce((s,l)=>s+l.monto,0);
    const devM=devsCl.filter(d=>d.pedido===pedido).reduce((s,d)=>s+d.monto,0);
    const devU=devsCl.filter(d=>d.pedido===pedido).reduce((s,d)=>s+d.unidades,0);
    const boxBg = pedEsPre ? "#f0f0f0" : "#fff";
    const box=el("div",{style:{background:boxBg,borderRadius:"12px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",marginBottom:"16px",overflow:"hidden",opacity:pedEsPre?"0.75":"1"}});

    const phdrLeft=el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
    phdrLeft.appendChild(el("span",{style:{fontWeight:"700",fontSize:"14px"}},`Pedido: ${pedido}`));
    if(pedEsPre) phdrLeft.appendChild(el("span",{style:{background:"rgba(255,255,255,0.25)",borderRadius:"4px",padding:"1px 8px",fontSize:"11px",fontWeight:"700"}},"📋 PRESUPUESTO"));
    phdr.appendChild(phdrLeft);
    const psum=el("div",{style:{display:"flex",gap:"16px",fontSize:"13px"}});
    if(!pedEsPre){
      psum.appendChild(el("span",{},`Bruto: ${fQ(pm)}`));
      if(devM>0) psum.appendChild(el("span",{style:{color:"#ffaaaa"}},`Dev: -${fQ(devM)}`));
      psum.appendChild(el("span",{style:{fontWeight:"700"}},`Neto: ${fQ(pm-devM)}`));
    } else {
      psum.appendChild(el("span",{style:{fontSize:"12px",opacity:"0.85"}},`${fQ(pm)} · Solo consulta`));
    }
    phdr.appendChild(psum); box.appendChild(phdr);
    const t=el("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"13px"}});
    const thead=el("thead"); const tr=el("tr");
    ["Producto","Unidades","P.Unit.","Monto","Dev. Unid.","Dev. Monto","Neto"].forEach((h,i)=>{
      tr.appendChild(el("th",{style:{padding:"9px 12px",textAlign:i===0?"left":"right",color:pedEsPre?"#888":"#555",fontWeight:"600",background:pedEsPre?"#e8e8e8":"#eef2f7",whiteSpace:"nowrap"}},h));
    });
    thead.appendChild(tr); t.appendChild(thead);
    const tbody=el("tbody");
    pData.lineas.forEach((l,li)=>{
      const ldU=devsCl.filter(d=>d.pedido===pedido&&d.producto===l.producto).reduce((s,d)=>s+d.unidades,0);
      const ldM=devsCl.filter(d=>d.pedido===pedido&&d.producto===l.producto).reduce((s,d)=>s+d.monto,0);
      const pu2=l.unidades>0?(l.monto/l.unidades):0; // 4 decimales abajo

      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",...(colTexto?{color:colTexto}:{})}},fN(l.unidades)));
      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:colTexto||"#888"}},`Q ${Number(pu2).toLocaleString("es-GT",{minimumFractionDigits:4,maximumFractionDigits:4})}`));
      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",...(colTexto?{color:colTexto}:{})}},fQ(l.monto)));
      // Si es presupuesto, no mostrar columnas de dev ni neto operativo

        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},"-"));
        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},"-"));

      }
      tbody.appendChild(row);
    });
    const totRow=el("tr",{style:{background:"#f0f4f8"}});
    totRow.appendChild(el("td",{style:{padding:"9px 12px",fontWeight:"700"},colspan:"3"},"Total"));
    totRow.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",fontWeight:"700"}},fQ(pm)));
    totRow.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",fontWeight:"700",color:"#c0392b"}},devU>0?`-${fN(devU)}`:"-"));
    totRow.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",fontWeight:"700",color:"#c0392b"}},devM>0?`-${fQ(devM)}`:"-"));

    tbody.appendChild(totRow); t.appendChild(tbody); box.appendChild(t);
    // Nota del vendedor

      const notaDiv=el("div",{style:{background:"#fffbea",borderTop:"1px solid #f0e68c",padding:"10px 16px",display:"flex",alignItems:"flex-start",gap:"8px"}});

      box.appendChild(notaDiv);
    }
    inner.appendChild(box);

  // Descuento y comentario
  const dcBox=el("div",{style:{background:"#fff",borderRadius:"12px",padding:"18px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",marginBottom:"16px"}});
  const dcGrid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"}});
  const descDiv=el("div");
  descDiv.appendChild(el("label",{style:{display:"block",fontSize:"13px",fontWeight:"600",color:"#555",marginBottom:"5px"}},"💲 Descuento en valores (Q)"));
  if(state.modoHistorial){
    descDiv.appendChild(el("div",{style:{padding:"8px 10px",background:"#f4f6f9",borderRadius:"8px",fontSize:"14px",fontWeight:"700",color:"#c0392b"}},tc.desc>0?`-${fQ(tc.desc)}`:"Q 0.00"));

  const motivoTotal = state.motivosDevTotal?.[c];

    inner.appendChild(motBox);

  // Devoluciones registradas
  if(devsCl.length>0){
    const dvBox=el("div",{style:{background:"#fff5f5",borderRadius:"12px",padding:"16px",marginBottom:"16px"}});
    dvBox.appendChild(el("p",{style:{margin:"0 0 10px",fontWeight:"700",color:"#c0392b",fontSize:"14px"}},"↩️ Devoluciones registradas"));
    devsCl.forEach(d=>{
      const row=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #ffd5d5",fontSize:"13px"}});
      const left=el("div");
      left.appendChild(el("span",{style:{background:"#c0392b",color:"#fff",borderRadius:"4px",padding:"2px 7px",fontSize:"11px",fontWeight:"700",marginRight:"8px"}},d.codigo));
      left.appendChild(document.createTextNode(d.producto));
      left.appendChild(el("span",{style:{color:"#888",marginLeft:"8px"}},`· ${fN(d.unidades)} unid. · ${d.desc}`));
      const right=el("div",{style:{display:"flex",alignItems:"center",gap:"12px"}});
      right.appendChild(el("span",{style:{color:"#c0392b",fontWeight:"700"}},`-${fQ(d.monto)}`));
      if(!state.modoHistorial && !state.bloqueados[c]) right.appendChild(el("button",{style:{background:"#ffe0e0",color:"#c0392b",border:"none",borderRadius:"5px",padding:"3px 9px",cursor:"pointer",fontSize:"12px"},onClick:()=>setState({devoluciones:state.devoluciones.filter(x=>x.id!==d.id)})},"✕"));
      row.appendChild(left); row.appendChild(right);
      dvBox.appendChild(row);
    });
    inner.appendChild(dvBox);
  }

  // Formulario devolución
  if(state.showDvForm && !state.modoHistorial && !state.bloqueados[c] && !esPresupuesto){
    const dvForm=el("div",{style:{background:"#fff",borderRadius:"12px",padding:"20px",boxShadow:"0 2px 8px rgba(0,0,0,0.1)",marginBottom:"16px"}});
    dvForm.appendChild(el("p",{style:{margin:"0 0 14px",fontWeight:"700",color:"#c0392b",fontSize:"15px"}},"↩️ Nueva Devolución"));
    const grid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}});

    // Pedido select
    const pedDiv=el("div");
    pedDiv.appendChild(el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"4px"}},"Pedido"));
    const pedSel=el("select",{style:inp()});
    pedSel.appendChild(el("option",{value:""},"-- Selecciona --"));
    pedidosEntregables.forEach(([p])=>pedSel.appendChild(el("option",{value:p},p)));
    pedSel.value=state.dvPedido;
    pedSel.onchange=e=>setState({dvPedido:e.target.value,dvProducto:"",dvUnidades:"",dvMonto:""});
    pedDiv.appendChild(pedSel); grid.appendChild(pedDiv);

    // Producto select
    const prDiv=el("div");
    prDiv.appendChild(el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"4px"}},"Producto"));
    const prSel=el("select",{style:inp()});
    if(!state.dvPedido) prSel.disabled=true;
    prSel.appendChild(el("option",{value:""},"-- Selecciona --"));
    prodsSel.forEach(p=>prSel.appendChild(el("option",{value:p.producto},`${p.producto} (disp: ${fN(p.dispU)} u)`)));
    prSel.value=state.dvProducto;
    prSel.onchange=e=>setState({dvProducto:e.target.value,dvUnidades:"",dvMonto:""});
    prDiv.appendChild(prSel); grid.appendChild(prDiv);

    // Unidades
    const uDiv=el("div");
    const uLabel=el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"4px"}},"Unidades");
    if(prodSel) uLabel.appendChild(el("span",{style:{color:"#888",fontWeight:"400"}},` (máx ${fN(prodSel.dispU)})`));
    uDiv.appendChild(uLabel);
    const uInp=document.createElement("input");
    uInp.type="number"; uInp.min="0"; uInp.placeholder="0";
    uInp.style.cssText="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-size:13px;box-sizing:border-box;font-family:sans-serif;";
    if(!state.dvProducto) uInp.disabled=true;
    uInp.value=state.dvUnidades||"";
    uInp.addEventListener("input",e=>{
      state.dvUnidades=e.target.value;
      const pu=precioUnit(c,state.dvPedido,state.dvProducto);
      if(pu>0){ state.dvMonto=((parseFloat(e.target.value)||0)*pu).toFixed(2); }
      const mInpEl=document.getElementById("dv-monto-inp");
      if(mInpEl) mInpEl.value=state.dvMonto;
    });
    uInp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); document.getElementById("dv-monto-inp")?.focus(); } });
    uDiv.appendChild(uInp); grid.appendChild(uDiv);

    // Monto
    const mDiv=el("div");
    mDiv.appendChild(el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"4px"}},["Monto Q ",el("span",{style:{color:"#27ae60",fontWeight:"400"}},"(auto)")]));
    const mInp=document.createElement("input");
    mInp.type="number"; mInp.min="0"; mInp.step="0.01"; mInp.placeholder="0.00"; mInp.id="dv-monto-inp";
    mInp.style.cssText="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-size:13px;box-sizing:border-box;background:#f9fff9;font-family:sans-serif;";
    mInp.value=state.dvMonto||"";
    mInp.addEventListener("input",e=>{ state.dvMonto=e.target.value; });
    mInp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); document.getElementById("dv-motivo-sel")?.focus(); } });
    mDiv.appendChild(mInp); grid.appendChild(mDiv);
    dvForm.appendChild(grid);

    // Motivo
    const motDiv=el("div",{style:{marginBottom:"12px"}});
    motDiv.appendChild(el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"4px"}},"Motivo"));
    const motSel=el("select",{style:inp(),id:"dv-motivo-sel"});
    MOTIVOS.forEach(m=>motSel.appendChild(el("option",{value:m.codigo},`${m.codigo} — ${m.desc}`)));
    motSel.value=state.dvCodigo;
    motSel.onchange=e=>setState({dvCodigo:e.target.value});
    motDiv.appendChild(motSel); dvForm.appendChild(motDiv);

    if(state.dvError) dvForm.appendChild(el("div",{style:{background:"#ffe0e0",color:"#c00",borderRadius:"6px",padding:"9px",marginBottom:"10px",fontSize:"12px"}},state.dvError));

    const btns=el("div",{style:{display:"flex",gap:"10px"}});
    btns.appendChild(el("button",{style:{flex:"1",background:"#c0392b",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 0",fontSize:"13px",fontWeight:"700",cursor:"pointer"},onClick:guardarDev},"✅ Guardar"));
    btns.appendChild(el("button",{style:{flex:"1",background:"#eee",color:"#555",border:"none",borderRadius:"8px",padding:"10px 0",fontSize:"13px",cursor:"pointer"},onClick:()=>setState({showDvForm:false,dvError:""})},"Cancelar"));
    dvForm.appendChild(btns);
    inner.appendChild(dvForm);
  }

  // ── Modal desbloqueo (dentro del detalle) ──
  if(state.passCliente === c) {
    const modal=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"999"}});
    const box=el("div",{style:{background:"#fff",borderRadius:"12px",padding:"28px",width:"320px",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}});
    box.appendChild(el("h3",{style:{margin:"0 0 6px",color:"#1e3a5f"}},"🔒 Desbloquear entrega"));
    box.appendChild(el("p",{style:{fontSize:"13px",color:"#888",margin:"0 0 16px",wordBreak:"break-all"}},c));
    const pWrap=el("div",{style:{position:"relative",marginBottom:"8px"}});
    const pInp=el("input",{type:state.verPassDesbloqueo?"text":"password",placeholder:"Contraseña",style:{...inp(),padding:"8px 36px 8px 10px"},autoFocus:true});
    pInp.value=state.passInput;
    pInp.addEventListener('input', e=>{ state.passInput=e.target.value; });
    pInp.addEventListener('keydown', e=>{ if(e.key==="Enter") intentarDesbloquear(); });
    pWrap.appendChild(pInp);
    pWrap.appendChild(el("button",{style:{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"16px",color:"#888",padding:"0"},onClick:()=>setState({verPassDesbloqueo:!state.verPassDesbloqueo})},state.verPassDesbloqueo?"🙈":"👁️"));
    box.appendChild(pWrap);
    if(state.passError) box.appendChild(el("p",{style:{color:"#c00",fontSize:"12px",margin:"0 0 10px"}},state.passError));
    const btns=el("div",{style:{display:"flex",gap:"10px",marginTop:"4px"}});
    btns.appendChild(el("button",{style:{flex:"1",background:"#1e3a5f",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 0",cursor:"pointer",fontWeight:"700"},onClick:intentarDesbloquear},"Desbloquear"));
    btns.appendChild(el("button",{style:{flex:"1",background:"#eee",color:"#555",border:"none",borderRadius:"8px",padding:"10px 0",cursor:"pointer"},onClick:()=>setState({passCliente:null,passInput:"",passError:""})},"Cancelar"));
    box.appendChild(btns); modal.appendChild(box); wrap.appendChild(modal);
  }

  // ── Botones de confirmación ──
  const estado = state.estadoEntrega[c] || null;
  const bloqueadoDetalle = state.bloqueados[c] || false;

  if(!esPresupuesto && !state.modoHistorial) {
    if(estado && bloqueadoDetalle) {
      // Bloqueado: mostrar estado + botón desbloquear
      const estadoLabel = estado==="verde"?"✅ Entrega confirmada":estado==="amarillo"?"🟡 Entrega parcial confirmada":"🌸 Devolución total confirmada";
      const estadoBg = estado==="verde"?"#e8f5e9":estado==="amarillo"?"#fffde7":"#fce4ec";
      const estadoColor = estado==="verde"?"#27ae60":estado==="amarillo"?"#f9a825":"#e91e8c";
      const estadoBox = el("div",{style:{background:estadoBg,borderRadius:"12px",padding:"14px 18px",marginBottom:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}});
      estadoBox.appendChild(el("span",{style:{fontWeight:"700",color:estadoColor,fontSize:"14px"}},estadoLabel));
      const unlockBtn = el("button",{style:{background:"#fff",border:"1px solid #ccc",borderRadius:"8px",padding:"7px 16px",cursor:"pointer",fontSize:"13px",fontWeight:"600",color:"#555"}},
        "🔓 Desbloquear"
      );
      unlockBtn.onclick = () => setState({passCliente:c, passInput:"", passError:""});
      estadoBox.appendChild(unlockBtn);
      inner.appendChild(estadoBox);
    } else if(!estado) {
      // Sin confirmar: mostrar botones de confirmación
      const confirmBox=el("div",{style:{background:"#fff",borderRadius:"12px",padding:"18px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",marginBottom:"16px"}});
      confirmBox.appendChild(el("p",{style:{margin:"0 0 14px",fontWeight:"700",color:"#1e3a5f",fontSize:"14px"}},"✅ Confirmar entrega"));

      // Botón verde: entrega completa
      const btnVerde=document.createElement("button");
      btnVerde.style.cssText="width:100%;background:#27ae60;color:#fff;border:none;border-radius:8px;padding:12px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif;margin-bottom:12px;";
      btnVerde.textContent="✅ Confirmar entrega completa";
      btnVerde.onclick=()=>{ confirmarDesdeDetalle(c,"verde"); };
      confirmBox.appendChild(btnVerde);

      const btnRow=el("div",{style:{display:"flex",gap:"12px"}});

      // Botón amarillo: entrega parcial
      if(devsCl.length > 0) {
        const btnAma=document.createElement("button");
        btnAma.style.cssText="flex:1;background:#f9a825;color:#fff;border:none;border-radius:8px;padding:12px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif;";
        btnAma.textContent="🟡 Confirmar entrega parcial";
        btnAma.onclick=()=>{
          const codigosUnicos=[...new Set(devsCl.map(d=>d.codigo))];
          const codigoConsolidado = codigosUnicos.length===1 ? codigosUnicos[0] : codigosUnicos.join("/");
          const descConsolidada = codigosUnicos.length===1
            ? (MOTIVOS.find(x=>x.codigo===codigosUnicos[0])?.desc||codigosUnicos[0])
            : codigosUnicos.map(cd=>MOTIVOS.find(x=>x.codigo===cd)?.desc||cd).join(" / ");
          confirmarDesdeDetalle(c,"amarillo",codigoConsolidado,descConsolidada);
        };
        btnRow.appendChild(btnAma);
      }

      // Motivo devolución total
      const motivoRosDiv=el("div",{style:{marginBottom:"12px"}});
      motivoRosDiv.appendChild(el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"4px"}},"Motivo devolución total"));
      const motivoRosSel=el("select",{style:{width:"100%",padding:"8px 10px",borderRadius:"6px",border:"1px solid #ccc",fontSize:"13px",boxSizing:"border-box",fontFamily:"sans-serif"}});
      motivoRosSel.appendChild(el("option",{value:""},"-- Selecciona motivo --"));
      MOTIVOS.forEach(m=>motivoRosSel.appendChild(el("option",{value:m.codigo},`${m.codigo} — ${m.desc}`)));
      motivoRosDiv.appendChild(motivoRosSel);
      confirmBox.appendChild(motivoRosDiv);

      // Botón rosado: devolución total
      const btnRos=document.createElement("button");
      btnRos.style.cssText="flex:1;background:#e91e8c;color:#fff;border:none;border-radius:8px;padding:12px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:sans-serif;";
      btnRos.textContent="Confirmar devolución total";
      btnRos.onclick=()=>{
        if(!motivoRosSel.value){ alert("Selecciona un motivo de devolución"); return; }
        confirmarDesdeDetalle(c,"rosado",motivoRosSel.value);
      };
      btnRow.appendChild(btnRos);

      confirmBox.appendChild(btnRow);
      inner.appendChild(confirmBox);
    }
  } else if(estado && (state.modoHistorial || esPresupuesto)) {
    // Historial o presupuesto: solo mostrar estado sin botón desbloquear
    const estadoLabel = estado==="verde"?"✅ Entrega confirmada":estado==="amarillo"?"🟡 Entrega parcial confirmada":"🌸 Devolución total confirmada";
    const estadoBg = estado==="verde"?"#e8f5e9":estado==="amarillo"?"#fffde7":"#fce4ec";
    const estadoColor = estado==="verde"?"#27ae60":estado==="amarillo"?"#f9a825":"#e91e8c";
    inner.appendChild(el("div",{style:{background:estadoBg,borderRadius:"12px",padding:"14px 18px",marginBottom:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      el("span",{style:{fontWeight:"700",color:estadoColor,fontSize:"14px"}},estadoLabel),
      el("span",{style:{fontSize:"12px",color:"#888"}},"📋 Solo lectura")
    ));
  }

  return wrap;
}

function renderMain() {
  const clientes=Object.keys(state.clienteMap);
  const clientesEntregables=clientes.filter(c=>!esClientePre(c));
  // Variables globales de renderMain (declaradas aquí para uso en modal y resto)
  const totalDevGral=clientesEntregables.reduce((s,c)=>{
    if(state.estadoEntrega[c]==="rosado") return s+totalesCliente(c).monto;
    return s+totalesCliente(c).devM;
  },0);
  const cntVerde=clientesEntregables.filter(c=>state.estadoEntrega[c]==="verde").length;
  const cntAmarillo=clientesEntregables.filter(c=>state.estadoEntrega[c]==="amarillo").length;
  const cntRosado=clientesEntregables.filter(c=>state.estadoEntrega[c]==="rosado").length;
  const entregadosCount=cntVerde+cntAmarillo;
  const montoTotal=clientesEntregables.reduce((s,c)=>s+totalesCliente(c).monto,0);
  const pctEfectividad=clientesEntregables.length>0?Math.round((cntVerde+cntAmarillo)/clientesEntregables.length*100):0;
  const gral=totalesGral();
  const montoEntregado=clientesEntregables.filter(c=>state.estadoEntrega[c] && state.estadoEntrega[c]!=="rosado").reduce((s,c)=>s+totalesCliente(c).netoM,0);
  const montoPendiente=clientesEntregables.filter(c=>!state.estadoEntrega[c]).reduce((s,c)=>s+totalesCliente(c).netoM,0);
  const clientesFiltrados=clientes.filter(c=>c.toLowerCase().includes(state.busqueda.toLowerCase()));
  const totalBilletes=BILLETES.reduce((s,b)=>s+b*(parseFloat(state.billetes[b])||0),0);
  const totalMonedas=parseFloat(state.monedas)||0;
  const totalEfectivo=totalBilletes+totalMonedas;
  const totalDeposito=parseFloat(state.deposito)||0;
  const totalTransferencia=parseFloat(state.transferencia)||0;
  const totalGastosDeCuenta=state.gastosDetalle.reduce((s,g)=>g.deCuenta?(s+(parseFloat(g.monto)||0)):s,0);
  const totalGastos=state.gastosDetalle.reduce((s,g)=>s+(parseFloat(g.monto)||0),0);
  const totalPagos=totalEfectivo+totalDeposito+totalTransferencia;
  // Total a cobrar solo de confirmados
  const totalACobrarConfirmado = Object.keys(state.clienteMap)
    .filter(c=>state.estadoEntrega[c] && state.estadoEntrega[c]!=="rosado")
    .reduce((s,c)=>s+totalesCliente(c).netoM,0);
  const diferencia=(totalPagos+totalGastosDeCuenta)-totalACobrarConfirmado;
  const porRuta={};
  clientesFiltrados.forEach(c=>{
    const r=state.clienteMap[c].ruta||"Sin ruta";
    if(!porRuta[r]) porRuta[r]=[];
    porRuta[r].push(c);
  });

  const wrap=el("div",{style:{fontFamily:"sans-serif",background:"#f4f6f9",minHeight:"100vh",padding:"24px"}});

  // Modal contraseña desbloqueo
  if(state.passCliente){
    const modal=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"999"}});
    const box=el("div",{style:{background:"#fff",borderRadius:"12px",padding:"28px",width:"320px",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}});
    box.appendChild(el("h3",{style:{margin:"0 0 6px",color:"#1e3a5f"}},"🔒 Desbloquear entrega"));
    box.appendChild(el("p",{style:{fontSize:"13px",color:"#888",margin:"0 0 16px",wordBreak:"break-all"}},state.passCliente));
    const pWrap=el("div",{style:{position:"relative",marginBottom:"8px"}});
    const pInp=el("input",{type:state.verPassDesbloqueo?"text":"password",placeholder:"Contraseña",style:{...inp(),padding:"8px 36px 8px 10px"},autoFocus:true});
    pInp.value=state.passInput;
    pInp.addEventListener('input', e=>{ state.passInput=e.target.value; });
    pInp.addEventListener('keydown', e=>{ if(e.key==="Enter") intentarDesbloquear(); });
    pWrap.appendChild(pInp);
    pWrap.appendChild(el("button",{style:{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"16px",color:"#888",padding:"0"},onClick:()=>setState({verPassDesbloqueo:!state.verPassDesbloqueo})},state.verPassDesbloqueo?"🙈":"👁️"));
    box.appendChild(pWrap);
    if(state.passError) box.appendChild(el("p",{style:{color:"#c00",fontSize:"12px",margin:"0 0 10px"}},state.passError));
    const btns=el("div",{style:{display:"flex",gap:"10px",marginTop:"4px"}});
    btns.appendChild(el("button",{style:{flex:"1",background:"#1e3a5f",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 0",cursor:"pointer",fontWeight:"700"},onClick:intentarDesbloquear},"Desbloquear"));
    btns.appendChild(el("button",{style:{flex:"1",background:"#eee",color:"#555",border:"none",borderRadius:"8px",padding:"10px 0",cursor:"pointer"},onClick:()=>setState({passCliente:null,passInput:"",passError:""})},"Cancelar"));
    box.appendChild(btns); modal.appendChild(box); wrap.appendChild(modal);
  }

  // Modal mover producto
  if(state.showMoverProd){
    const clientes = Object.keys(state.clienteMap);
    const mModal=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"999",padding:"16px"}});
    const mBox=el("div",{style:{background:"#fff",borderRadius:"14px",padding:"24px",width:"100%",maxWidth:"400px",boxShadow:"0 8px 32px rgba(0,0,0,0.2)",maxHeight:"90vh",overflowY:"auto"}});
    mBox.appendChild(el("h3",{style:{margin:"0 0 18px",color:"#1e3a5f",fontSize:"16px"}},"🔀 Mover producto entre clientes"));

    // -- ORIGEN --
    mBox.appendChild(el("p",{style:{margin:"0 0 6px",fontWeight:"700",color:"#555",fontSize:"13px"}},"ORIGEN"));

    // Select cliente origen
    const selOrigenC = el("select",{style:{width:"100%",padding:"8px 10px",borderRadius:"8px",border:"1px solid #ccc",marginBottom:"10px",fontSize:"13px"}});
    selOrigenC.appendChild(el("option",{value:""},"— Cliente origen —"));
    clientes.forEach(c=>{ const o=el("option",{value:c},c); if(state.moverOrigenCliente===c) o.selected=true; selOrigenC.appendChild(o); });
    selOrigenC.addEventListener("change",e=>{setState({moverOrigenCliente:e.target.value,moverOrigenPedido:"",moverProductoSel:""});});
    mBox.appendChild(selOrigenC);

    // Select pedido origen
    if(state.moverOrigenCliente){
      const pedidosOrigen = Object.keys(state.clienteMap[state.moverOrigenCliente]?.pedidos||{});
      const selOrigenP = el("select",{style:{width:"100%",padding:"8px 10px",borderRadius:"8px",border:"1px solid #ccc",marginBottom:"10px",fontSize:"13px"}});
      selOrigenP.appendChild(el("option",{value:""},"— Pedido origen —"));
      pedidosOrigen.forEach(p=>{ const o=el("option",{value:p},p); if(state.moverOrigenPedido===p) o.selected=true; selOrigenP.appendChild(o); });
      selOrigenP.addEventListener("change",e=>{setState({moverOrigenPedido:e.target.value,moverProductoSel:""});});
      mBox.appendChild(selOrigenP);
    }

    // Select producto
    if(state.moverOrigenCliente && state.moverOrigenPedido){
      const lineas = state.clienteMap[state.moverOrigenCliente]?.pedidos?.[state.moverOrigenPedido]?.lineas||[];
      const selProd = el("select",{style:{width:"100%",padding:"8px 10px",borderRadius:"8px",border:"1px solid #ccc",marginBottom:"16px",fontSize:"13px"}});
      selProd.appendChild(el("option",{value:""},"— Selecciona producto —"));
      lineas.forEach(l=>{ const o=el("option",{value:l.producto},`${l.producto} (${l.unidades} u — Q${l.monto.toFixed(2)})`); if(state.moverProductoSel===l.producto) o.selected=true; selProd.appendChild(o); });
      selProd.addEventListener("change",e=>{setState({moverProductoSel:e.target.value});});
      mBox.appendChild(selProd);
    }

    // -- DESTINO --
    mBox.appendChild(el("p",{style:{margin:"0 0 6px",fontWeight:"700",color:"#555",fontSize:"13px"}},"DESTINO"));

    // Select cliente destino
    const selDestinoC = el("select",{style:{width:"100%",padding:"8px 10px",borderRadius:"8px",border:"1px solid #ccc",marginBottom:"10px",fontSize:"13px"}});

        cb.onchange=()=>confirmarVerde(cliente);
        cbTd.appendChild(cb);
      }
      row.appendChild(cbTd);

      // Nombre
      const nameTd=el("td",{style:{padding:"9px 12px"}});
      const nameBtn=document.createElement("button");
      nameBtn.style.cssText=`background:none;border:none;cursor:pointer;color:${esPresupuesto?"#666":"#1e3a5f"};font-weight:600;font-size:13px;text-decoration:underline;padding:0;text-align:left;font-family:sans-serif;`;
      nameBtn.textContent=cliente;
      nameBtn.onclick=()=>setState({clienteDetalle:cliente});
      nameTd.appendChild(nameBtn);
      // Badge presupuesto
      if(esPresupuesto){
        nameTd.appendChild(el("span",{style:{marginLeft:"6px",background:"#9e9e9e",color:"#fff",borderRadius:"4px",padding:"1px 6px",fontSize:"10px",fontWeight:"700",verticalAlign:"middle"}},"PRESUPUESTO"));
      }
      if(notasVendedor.length>0){
        const notaP=document.createElement("p");
        notaP.style.cssText="margin:3px 0 0;font-size:11px;color:#c07000;font-style:italic;line-height:1.3;";
        notaP.textContent="📝 "+notasVendedor.join(" | ");
        nameTd.appendChild(notaP);
      }
      row.appendChild(nameTd);

      if(esPresupuesto){
        // Columnas de montos vacías — es fantasma, no cuenta para totales
        row.appendChild(el("td",{style:{padding:"9px 12px",color:"#bbb",fontSize:"12px"}},"-"));
        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},fQ(tt.monto)));
        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},"-"));
        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},"-"));
        row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#bbb"}},"-"));
        row.appendChild(el("td",{},""));
        tbody.appendChild(row);
        return;
      }

      row.appendChild(el("td",{style:{padding:"9px 12px",color:"#555",fontSize:"12px"}},pedidosList));
      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right"}},fQ(tt.monto)));
      // Dev: si es rosado (devolución total) mostrar el monto bruto; si no, mostrar devoluciones parciales
      const devMostrar = estado==="rosado" ? tt.monto : tt.devM;
      const devColor = estado==="rosado" ? "#e91e8c" : "#c0392b";
      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:devColor}},devMostrar>0?`-${fQ(devMostrar)}`:"-"));
      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",color:"#e67e22"}},tt.desc>0?`-${fQ(tt.desc)}`:"-"));
      // Neto: blanco si no confirmado, Q0.00 si devolución total, normal si confirmado
      const netoVal = !estado ? "-" : estado==="rosado" ? fQ(0) : fQ(tt.netoM);
      const netoColor = estado==="rosado" ? "#e91e8c" : "#1e3a5f";
      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"right",fontWeight:"700",color:netoColor}},netoVal));
      row.appendChild(el("td",{style:{padding:"9px 12px",textAlign:"center"}},tieneComentario?el("span",{title:state.comentarios[cliente],style:{cursor:"help",fontSize:"16px"}},"💬"):""));
      tbody.appendChild(row);
    });

    // Fila total ruta
    const totRow=el("tr",{style:{background:"#2d5f8a",color:"#fff"}});
    totRow.appendChild(el("td",{style:{padding:"10px 12px",fontWeight:"700"},colspan:"3"},`Total ${ruta}`));
    totRow.appendChild(el("td",{style:{padding:"10px 12px",textAlign:"right",fontWeight:"700"}},fQ(rutaEntregables.reduce((s,c)=>s+totalesCliente(c).monto,0))));
    totRow.appendChild(el("td",{style:{padding:"10px 12px",textAlign:"right",fontWeight:"700",color:"#ffaaaa"}},devTotalRuta>0?`-${fQ(devTotalRuta)}`:"-"));
    totRow.appendChild(el("td",{style:{padding:"10px 12px",textAlign:"right",fontWeight:"700",color:"#ffd580"}},descRuta>0?`-${fQ(descRuta)}`:"-"));
    totRow.appendChild(el("td",{style:{padding:"10px 12px",textAlign:"right",fontWeight:"700"}},netoRutaConfirmado>0?fQ(netoRutaConfirmado):"-"));
    totRow.appendChild(el("td",{}));
    tbody.appendChild(totRow);
    t.appendChild(tbody); tblScroll.appendChild(t); tblWrap.appendChild(tblScroll); rutaDiv.appendChild(tblWrap);
    inner.appendChild(rutaDiv);
  });

  // Panel cuadre final
  const cuadre=el("div",{style:{background:"#fff",borderRadius:"12px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",padding:"20px",marginTop:"8px"}});
  cuadre.appendChild(el("h3",{style:{margin:"0 0 18px",color:"#1e3a5f",fontSize:"15px"}},"💳 Cuadre Final"));
  const cuadreGrid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"20px"}});

  // ── Billetes (sin re-render) ──
  const billDiv=el("div");
  billDiv.appendChild(el("div",{style:{fontWeight:"700",fontSize:"13px",color:"#555",marginBottom:"8px"}},"💵 Billetes"));
  // Encabezados de columna
  const billHdr=document.createElement("div");
  billHdr.style.cssText="display:grid;grid-template-columns:48px 16px 60px 75px;gap:8px;align-items:center;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #eef2f7;";
  ["DEN.","","CANT","TOTAL Q"].forEach((h,i)=>{
    const s=document.createElement("span");
    s.style.cssText="font-size:10px;font-weight:700;color:#888;text-align:"+(i===3?"right":i===0?"center":"center")+";";
    s.textContent=h;
    billHdr.appendChild(s);
  });
  billDiv.appendChild(billHdr);
  const subtotalBillSpan=document.createElement("span");
  subtotalBillSpan.style.cssText="color:#1e3a5f;font-weight:700;width:75px;text-align:right;";
  const actualizarBilletes=()=>{
    const tot=[1,5,10,20,50,100,200].reduce((s,b)=>s+b*(parseFloat(state.billetes[b])||0),0);
    subtotalBillSpan.textContent=fQ(tot);
    const tef=document.getElementById("total-efectivo-span");
    if(tef) tef.textContent=fQ(tot+(parseFloat(state.monedas)||0));
    actualizarResumen();
  };
  BILLETES.forEach(b=>{
    const row=document.createElement("div");
    row.style.cssText="display:grid;grid-template-columns:48px 16px 60px 75px;gap:8px;align-items:center;margin-bottom:7px;";
    const lbl=document.createElement("span");
    lbl.style.cssText="background:#1e3a5f;color:#fff;border-radius:5px;padding:2px 8px;font-size:12px;font-weight:700;text-align:center;";
    lbl.textContent=`Q${b}`;
    const x=document.createElement("span"); x.style.cssText="color:#aaa;font-size:11px;text-align:center;"; x.textContent="×";
    const bi=document.createElement("input");
    bi.type="number"; bi.min="0"; bi.placeholder="0";
    bi.style.cssText="width:100%;padding:5px 8px;border-radius:6px;border:1px solid #ccc;font-size:13px;text-align:right;box-sizing:border-box;font-family:sans-serif;"+(state.modoHistorial?";background:#f4f6f9;color:#555;cursor:not-allowed":"");
    if(state.modoHistorial) bi.disabled=true;
    bi.value=state.billetes[b]||"";
    const totSpan=document.createElement("span");
    totSpan.style.cssText="text-align:right;font-size:12px;color:#1e3a5f;font-weight:600;";
    totSpan.textContent=fQ(b*(parseFloat(state.billetes[b])||0));
    bi.setAttribute("data-cuadre","1");
    bi.addEventListener("input",e=>{
      state.billetes[b]=e.target.value;
      totSpan.textContent=fQ(b*(parseFloat(e.target.value)||0));
      actualizarBilletes();
    });
    bi.addEventListener("keydown", focusNextCuadre);
    row.appendChild(lbl); row.appendChild(x); row.appendChild(bi); row.appendChild(totSpan);
    billDiv.appendChild(row);
  });
  const subtotalRow=document.createElement("div");
  subtotalRow.style.cssText="border-top:2px solid #eef2f7;padding-top:8px;display:grid;grid-template-columns:48px 16px 60px 75px;gap:8px;align-items:center;font-weight:700;font-size:13px;margin-top:4px;";
  const subtotalLbl=document.createElement("span");
  subtotalLbl.style.cssText="color:#555;grid-column:1/4;font-size:12px;";
  subtotalLbl.textContent="Subtotal billetes";
  subtotalBillSpan.textContent=fQ([1,5,10,20,50,100,200].reduce((s,b)=>s+b*(parseFloat(state.billetes[b])||0),0));
  subtotalRow.appendChild(subtotalLbl); subtotalRow.appendChild(subtotalBillSpan);
  billDiv.appendChild(subtotalRow);
  cuadreGrid.appendChild(billDiv);

  // ── Monedas (sin re-render) ──
  const monDiv=el("div");
  monDiv.appendChild(el("div",{style:{fontWeight:"700",fontSize:"13px",color:"#555",marginBottom:"10px"}},"🪙 Monedas"));
  const monRow=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}});
  monRow.appendChild(el("span",{style:{background:"#64748b",color:"#fff",borderRadius:"5px",padding:"4px 10px",fontSize:"12px",fontWeight:"700",whiteSpace:"nowrap"}},"Total Q"));
  const monInp=document.createElement("input");
  monInp.type="number"; monInp.min="0"; monInp.step="0.01"; monInp.placeholder="0.00";
  monInp.style.cssText="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-size:13px;box-sizing:border-box;text-align:right;font-family:sans-serif;"+(state.modoHistorial?";background:#f4f6f9;color:#555;cursor:not-allowed":"");
  if(state.modoHistorial) monInp.disabled=true;
  monInp.value=state.monedas||"";
  monInp.setAttribute("data-cuadre","1");
  monInp.addEventListener("input",e=>{
    state.monedas=e.target.value;
    const tef=document.getElementById("total-efectivo-span");
    if(tef){ const bill=[1,5,10,20,50,100,200].reduce((s,b)=>s+b*(parseFloat(state.billetes[b])||0),0); tef.textContent=fQ(bill+(parseFloat(e.target.value)||0)); }
    actualizarResumen();
  });
  monInp.addEventListener("keydown", focusNextCuadre);
  monRow.appendChild(monInp); monDiv.appendChild(monRow);
  monDiv.appendChild(el("div",{style:{borderTop:"2px solid #eef2f7",paddingTop:"8px",display:"flex",justifyContent:"space-between",fontWeight:"700",fontSize:"13px"}},
    el("span",{style:{color:"#555"}},"Subtotal monedas"),el("span",{style:{color:"#1e3a5f"}},fQ(parseFloat(state.monedas)||0))
  ));
  const totEfectivoDiv=el("div",{style:{marginTop:"8px",background:"#f0f4f8",borderRadius:"7px",padding:"8px 12px",display:"flex",justifyContent:"space-between",fontWeight:"700",fontSize:"13px"}});
  totEfectivoDiv.appendChild(el("span",{},"Total Efectivo"));
  const totEfectivoSpan=document.createElement("span");
  totEfectivoSpan.id="total-efectivo-span";
  totEfectivoSpan.style.color="#27ae60";
  totEfectivoSpan.textContent=fQ([1,5,10,20,50,100,200].reduce((s,b)=>s+b*(parseFloat(state.billetes[b])||0),0)+(parseFloat(state.monedas)||0));
  totEfectivoDiv.appendChild(totEfectivoSpan);
  monDiv.appendChild(totEfectivoDiv);
  cuadreGrid.appendChild(monDiv);

  // ── Otros pagos (sin re-render) ──
  const otrosDiv=el("div",{style:{display:"flex",flexDirection:"column",gap:"12px"}});
  const depDiv=el("div");
  depDiv.appendChild(el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"4px"}},"🏦 Depósito bancario (Q)"));
  const depInp=document.createElement("input");
  depInp.type="number"; depInp.min="0"; depInp.step="0.01"; depInp.placeholder="0.00";
  depInp.style.cssText="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-size:13px;box-sizing:border-box;font-family:sans-serif;"+(state.modoHistorial?";background:#f4f6f9;color:#555;cursor:not-allowed":"");
  if(state.modoHistorial) depInp.disabled=true;
  depInp.value=state.deposito||"";
  depInp.setAttribute("data-cuadre","1");
  depInp.addEventListener("input",e=>{ state.deposito=e.target.value; actualizarResumen(); });
  depInp.addEventListener("keydown", focusNextCuadre);
  depDiv.appendChild(depInp); otrosDiv.appendChild(depDiv);

  const traDiv=el("div");
  traDiv.appendChild(el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"4px"}},"📲 Transferencia (Q)"));
  const traInp=document.createElement("input");
  traInp.type="number"; traInp.min="0"; traInp.step="0.01"; traInp.placeholder="0.00";
  traInp.style.cssText="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-size:13px;box-sizing:border-box;font-family:sans-serif;"+(state.modoHistorial?";background:#f4f6f9;color:#555;cursor:not-allowed":"");
  if(state.modoHistorial) traInp.disabled=true;
  traInp.value=state.transferencia||"";
  traInp.setAttribute("data-cuadre","1");
  traInp.addEventListener("input",e=>{ state.transferencia=e.target.value; actualizarResumen(); });
  traInp.addEventListener("keydown", focusNextCuadre);
  traDiv.appendChild(traInp); otrosDiv.appendChild(traDiv);

  // Gastos
  const gasDiv=el("div");
  gasDiv.appendChild(el("label",{style:{display:"block",fontSize:"12px",fontWeight:"600",color:"#555",marginBottom:"6px"}},"⛽ Gastos de ruta"));
  const gasTable=el("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"12px",marginBottom:"6px"}});
  const gasThead=el("thead"); const gasTr=el("tr");
  [["","20px"],["Descripción","38%"],["Monto Q","22%"],["Comentario",""],["","24px"]].forEach(([h,w])=>{
    gasTr.appendChild(el("th",{style:{background:"#f0f4f8",padding:"5px 8px",textAlign:h==="Monto Q"?"right":"center",color:"#555",fontWeight:"600",...(w?{width:w}:{})}},h));
  });
  gasThead.appendChild(gasTr); gasTable.appendChild(gasThead);
  const gasTbody=el("tbody");
  state.gastosDetalle.forEach((g,gi)=>{
    const grow=el("tr");
    // Checkbox "de cuenta"
    const gcbTd=el("td",{style:{padding:"3px 4px",textAlign:"center"}});
    if(!state.modoHistorial){
      const gcb=document.createElement("input"); gcb.type="checkbox";
      gcb.style.cssText="width:15px;height:15px;cursor:pointer;accent-color:#27ae60;";
      gcb.checked=g.deCuenta||false;
      gcb.title="Marcar si el dinero se tomó de lo cobrado en ruta";
      gcb.addEventListener("change",e=>{state.gastosDetalle[gi].deCuenta=e.target.checked; actualizarResumen();});
      gcbTd.appendChild(gcb);
    } else {
      gcbTd.appendChild(el("span",{style:{fontSize:"13px"}},g.deCuenta?"✅":"⬜"));
    }
    grow.appendChild(gcbTd);
    const gd=el("td",{style:{padding:"3px 4px"}});
    const gdInp=document.createElement("input"); gdInp.placeholder="Ej: Combustible";
    gdInp.style.cssText="width:100%;padding:4px 6px;border-radius:6px;border:1px solid #ccc;font-size:12px;box-sizing:border-box;font-family:sans-serif;"+(state.modoHistorial?";background:#f4f6f9;color:#555;cursor:not-allowed":"");
    if(state.modoHistorial) gdInp.disabled=true;
    gdInp.value=g.desc||"";
    gdInp.addEventListener("input",e=>{state.gastosDetalle[gi].desc=e.target.value;});
    gdInp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); gm.querySelector("input")?.focus(); } });
    gd.appendChild(gdInp);
    const gm=el("td",{style:{padding:"3px 4px"}});
    const gmInp=document.createElement("input"); gmInp.type="number"; gmInp.min="0"; gmInp.step="0.01"; gmInp.placeholder="0.00";
    gmInp.style.cssText="width:100%;padding:4px 6px;border-radius:6px;border:1px solid #ccc;font-size:12px;box-sizing:border-box;text-align:right;font-family:sans-serif;"+(state.modoHistorial?";background:#f4f6f9;color:#555;cursor:not-allowed":"");
    if(state.modoHistorial) gmInp.disabled=true;
    gmInp.value=g.monto||"";
    gmInp.setAttribute("data-cuadre","1");
    gmInp.addEventListener("input",e=>{state.gastosDetalle[gi].monto=e.target.value; actualizarResumen();});
    gmInp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); gcInp.focus(); } });
    gm.appendChild(gmInp);
    const gc=el("td",{style:{padding:"3px 4px"}});
    const gcInp=document.createElement("input"); gcInp.placeholder="Opcional";
    gcInp.style.cssText="width:100%;padding:4px 6px;border-radius:6px;border:1px solid #ccc;font-size:12px;box-sizing:border-box;font-family:sans-serif;"+(state.modoHistorial?";background:#f4f6f9;color:#555;cursor:not-allowed":"");
    if(state.modoHistorial) gcInp.disabled=true;
    gcInp.value=g.comentario||"";
    gcInp.addEventListener("input",e=>{state.gastosDetalle[gi].comentario=e.target.value;});
    gc.appendChild(gcInp);
    const gx=el("td",{style:{padding:"3px 4px",textAlign:"center"}});
    if(state.gastosDetalle.length>1) gx.appendChild(el("button",{style:{background:"none",border:"none",color:"#c0392b",cursor:"pointer",fontSize:"14px",padding:"0"},onClick:()=>setState({gastosDetalle:state.gastosDetalle.filter((_,i)=>i!==gi)})},"✕"));
    grow.appendChild(gd);grow.appendChild(gm);grow.appendChild(gc);grow.appendChild(gx);
    gasTbody.appendChild(grow);
  });
  gasTable.appendChild(gasTbody); gasDiv.appendChild(gasTable);
  gasDiv.appendChild(el("button",{style:{background:"#eef2f7",border:"none",borderRadius:"6px",padding:"4px 12px",fontSize:"12px",cursor:"pointer",color:"#1e3a5f",fontWeight:"600"},onClick:()=>setState({gastosDetalle:[...state.gastosDetalle,{desc:"",monto:"",comentario:"",deCuenta:true}]})},"+ Agregar gasto"));
  otrosDiv.appendChild(gasDiv);

  // Resumen cuadre
  const resumen=document.createElement("div");
  resumen.id="resumen-cuadre";
  resumen.style.cssText="background:#f0f4f8;border-radius:9px;padding:14px;margin-top:4px;";
  otrosDiv.appendChild(resumen);
  // Llenar resumen DESPUÉS de que esté en el DOM
  setTimeout(actualizarResumen, 0);
  cuadreGrid.appendChild(otrosDiv);
  cuadre.appendChild(cuadreGrid);
  inner.appendChild(cuadre);

  // Botón confirmar
  const confirmDiv=el("div",{style:{marginTop:"20px",textAlign:"center",paddingBottom:"32px"}});
  if(state.confirmado){
    const reconfDiv=el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"12px"}});
    reconfDiv.appendChild(el("div",{style:{background:"#e8f5e9",borderRadius:"12px",padding:"16px 24px",display:"inline-flex",alignItems:"center",gap:"10px",fontSize:"15px",fontWeight:"700",color:"#27ae60"}},"✅ Liquidación confirmada y guardada correctamente"));
    if(state.esAdmin){
      reconfDiv.appendChild(el("button",{style:{background:"#e67e22",color:"#fff",border:"none",borderRadius:"12px",padding:"12px 36px",fontSize:"14px",fontWeight:"700",cursor:"pointer",boxShadow:"0 4px 12px rgba(230,126,34,0.3)"},onClick:confirmarLiquidacion},"🔄 Volver a confirmar / guardar cambios"));
    }
    confirmDiv.appendChild(reconfDiv);
  } else {
    confirmDiv.appendChild(el("button",{style:{background:"#27ae60",color:"#fff",border:"none",borderRadius:"12px",padding:"14px 48px",fontSize:"16px",fontWeight:"700",cursor:"pointer",boxShadow:"0 4px 12px rgba(39,174,96,0.3)"},onClick:()=>{
      const sinConfirmar=clientes.filter(c=>!state.estadoEntrega[c] && !esClientePre(c));
      if(sinConfirmar.length>0){
        alert(`⚠️ Hay ${sinConfirmar.length} entrega(s) sin confirmar:\n\n${sinConfirmar.map(c=>`• ${c}`).join("\n")}\n\nPor favor confirma todas las entregas antes de liquidar.`);
        return;
      }
      setState({showConfirmar:true});
    }},"✅ Confirmar Liquidación"));
  }
  inner.appendChild(confirmDiv);
  return wrap;
}

// ── Render principal ──
function render() {
  const app=document.getElementById("app");
  app.innerHTML="";
  let content;
  if(!state.autenticado) content=renderLogin();
  else if(state.cargandoDatos) content=renderCargando();
  else if(state.screen==="inicio") content=renderInicio();
  else if(state.screen==="nodatos") content=renderNoDatos();
  else if(state.screen==="upload") content=renderUpload();
  else if(state.screen==="historial") content=renderHistorial();
  else if(state.screen==="historialVista" && state.clienteDetalle) content=renderDetalleCliente();
  else if(state.screen==="confirmado") content=renderConfirmado();
  else if(state.screen==="opciones") content=renderOpciones();
  else if(state.screen==="historialVista") content=renderMain();
  else if(state.clienteDetalle) content=renderDetalleCliente();
  else content=renderMain();
  app.appendChild(content);
}

render();
</script>
</body>
</html>
